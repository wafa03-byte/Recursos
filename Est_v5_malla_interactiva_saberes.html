<style>
  body { margin: 20px; background: #FAFAFA; font-family: Calibri, 'Segoe UI', sans-serif; }
  h1 { text-align: center; font-size: 14px; color: #333; margin-bottom: 5px; }
  .controls { text-align: center; margin: 8px 0; }
  .controls button {
    padding: 6px 18px; margin: 0 6px; border: 1px solid #999; border-radius: 4px;
    background: white; font-size: 14px; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .controls button:hover { background: #E8E8E8; }
  .controls button.active { background: #333; color: white; border-color: #333; }
  svg { display: block; margin: 0 auto; }
  .course-box { transition: opacity 0.2s; }
  .course-box.dimmed { opacity: 0.25; }
  .course-box.highlighted rect.box-code-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.highlighted rect.box-name-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.selected rect.box-code-bg { stroke: #DC2626; stroke-width: 3; }
  .course-box.selected rect.box-name-bg { stroke: #DC2626; stroke-width: 3; }
  .arrow { transition: opacity 0.3s; }
  @media print { body { margin: 0; background: white; } .controls { display: none; } }

  /* ── Panel de saberes ─────────────────────────────────────────────── */
  #saberes-panel {
    position: fixed;
    bottom: 0; right: 0;
    width: 370px;
    max-height: 52vh;
    background: #fff;
    border: 1px solid #bbb;
    border-bottom: none;
    border-radius: 8px 0 0 0;
    box-shadow: -3px -3px 12px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.28s ease;
    z-index: 999;
    font-family: Calibri, 'Segoe UI', sans-serif;
  }
  #saberes-panel.visible { transform: translateY(0); }
  #saberes-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 8px 12px 6px;
    background: #1e3a5f;
    border-radius: 8px 0 0 0;
    flex-shrink: 0;
  }
  #saberes-header-text { flex: 1; }
  #saberes-curso-nombre {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    line-height: 1.3;
  }
  #saberes-curso-codigo {
    font-size: 11px;
    color: #a8c4e0;
    margin-top: 1px;
  }
  #saberes-close {
    background: none;
    border: none;
    color: #a8c4e0;
    font-size: 18px;
    cursor: pointer;
    padding: 0 0 0 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  #saberes-close:hover { color: #fff; }
  #saberes-body {
    overflow-y: auto;
    padding: 8px 12px 12px;
    flex: 1;
    font-size: 12.5px;
    color: #222;
  }
  #saberes-body::-webkit-scrollbar { width: 5px; }
  #saberes-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .saberes-unit-title {
    font-weight: bold;
    color: #1e3a5f;
    margin: 10px 0 4px;
    font-size: 12.5px;
    border-bottom: 1px solid #e0e8f0;
    padding-bottom: 3px;
  }
  .saberes-unit-title:first-child { margin-top: 2px; }
  .saberes-topic {
    display: flex;
    gap: 5px;
    margin: 2px 0;
    line-height: 1.4;
  }
  .saberes-topic::before {
    content: '•';
    color: #1e3a5f;
    flex-shrink: 0;
  }
  .saberes-no-info {
    color: #888;
    font-style: italic;
    margin-top: 8px;
  }
  @media print { #saberes-panel { display: none; } }
</style>

function normCode(code) {
  // HTML usa 7 dígitos con 0 inicial; Excel usa 6 dígitos sin él
  if (code && code.startsWith('0')) return code.slice(1);
  return code;
}

function showSaberes(code) {
  const key = normCode(code);
  const data = SABERES[key];
  const panel = document.getElementById('saberes-panel');
  const nombre = document.getElementById('saberes-curso-nombre');
  const codigoEl = document.getElementById('saberes-curso-codigo');
  const body = document.getElementById('saberes-body');

  if (data) {
    nombre.textContent = data.name;
    codigoEl.textContent = 'Código: ' + code;
    let html = '';
    if (data.units && data.units.length > 0) {
      data.units.forEach(u => {
        html += '<div class="saberes-unit-title">' + u.title + '</div>';
        if (u.topics && u.topics.length > 0) {
          u.topics.forEach(t => {
            html += '<div class="saberes-topic"><span>' + t + '</span></div>';
          });
        }
      });
    } else {
      html = '<div class="saberes-no-info">Sin información de saberes.</div>';
    }
    body.innerHTML = html;
  } else {
    // Obtener nombre del curso desde el SVG
    const box = document.querySelector('.course-box[data-code="' + code + '"]');
    let name = code;
    if (box) {
      const texts = box.querySelectorAll('text');
      const parts = [];
      texts.forEach(t => { if (t.textContent && !t.textContent.match(/^\d+$/)) parts.push(t.textContent.trim()); });
      name = parts.slice(1).join(' ') || code; // skip first text (code itself)
    }
    nombre.textContent = name || code;
    codigoEl.textContent = 'Código: ' + code;
    body.innerHTML = '<div class="saberes-no-info">Microcurrículo no disponible para este curso.</div>';
  }
  panel.classList.add('visible');
  body.scrollTop = 0;
}

function hideSaberes() {
  document.getElementById('saberes-panel').classList.remove('visible');
}

// Parchear funciones existentes de forma aditiva (sin modificar el código original)
const _origShowChain = showChain;
showChain = function(code) { _origShowChain(code); showSaberes(code); };

const _origClearAll = clearAll;
clearAll = function() { _origClearAll(); hideSaberes(); };

const _origShowAll = showAll;
showAll = function() { _origShowAll(); hideSaberes(); };
</script>
</body></html>
