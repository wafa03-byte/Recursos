  body { margin: 20px; background: #FAFAFA; font-family: Calibri, 'Segoe UI', sans-serif; }
  h1 { text-align: center; font-size: 14px; color: #333; margin-bottom: 5px; }
  .controls { text-align: center; margin: 8px 0; }
  .controls button {
    padding: 6px 18px; margin: 0 6px; border: 1px solid #999; border-radius: 4px;
    background: white; font-size: 14px; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .controls button:hover { background: #E8E8E8; }
  .controls button.active { background: #333; color: white; border-color: #333; }
  #info-box {
    text-align: center; min-height: 22px; margin: 6px auto 10px;
    font-size: 14px; color: #333; padding: 0 20px;
  }
  #info-box .code { font-weight: bold; }
  #info-box .req { color: #B45309; }
  svg { display: block; margin: 0 auto; }
  .course-box { transition: opacity 0.2s; }
  .course-box.dimmed { opacity: 0.25; }
  .course-box.highlighted rect.box-code-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.highlighted rect.box-name-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.selected rect.box-code-bg { stroke: #DC2626; stroke-width: 3; }
  .course-box.selected rect.box-name-bg { stroke: #DC2626; stroke-width: 3; }
  .arrow { transition: opacity 0.3s; }
  @media print {
    body { margin: 0; background: white; }
    .controls, #info-box { display: none; }
  }

  /* ── saberes-panel ─────────────────────────────────────────── */
  #saberes-panel {
    position: fixed; bottom: 20px; right: 20px;
    width: 400px; max-height: 55vh;
    background: white; border: 1px solid #ccc;
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    display: none; flex-direction: column;
    font-family: sans-serif; font-size: 14px; z-index: 9999;
  }
  #saberes-panel.visible { display: flex; }
  #saberes-header {
    background: #1e3a5f; color: white;
    padding: 10px 14px; font-size: 15px; font-weight: bold;
    border-radius: 6px 6px 0 0; cursor: grab;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none; flex-shrink: 0;
  }
  #saberes-header:active { cursor: grabbing; }
  #saberes-close {
    background: none; border: none; color: white;
    font-size: 20px; line-height: 1; cursor: pointer;
    padding: 0 2px; opacity: 0.8;
  }
  #saberes-close:hover { opacity: 1; }
  #saberes-body {
    padding: 12px 14px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.5; flex: 1;
  }
  #saberes-body.no-data { color: #888; font-style: italic; }
  @media print { #saberes-panel { display: none !important; } }

</style>

const SABERES = {"303001": "Unidad 1: Aritmética\nTemas:\nNúmeros reales, potenciación, radicación, expresiones algebraicas y operaciones.\nProductos notables y factorización, números complejos, ecuaciones algebraicas.\nInecuaciones, razones, proporciones y porcentajes.\n\nUnidad 2: Funciones\nTemas:\nRectas, relaciones, funciones: dominio, rango, gráficas, operaciones, composición y transformaciones.\nFunciones por tramos, pares e impares, funciones 1-1, sobre y biyectivas, funciones invertibles.\nFunciones exponenciales, logarítmicas y ecuaciones asociadas.\n\nUnidad 3: Polinomios\nTemas:\nFunciones polinomiales, algoritmo de la división, álgebra de polinomios, Teorema fundamental del álgebra y del valor intermedio, regla de signos de Descartes\nCeros racionales, irracionales y complejos, sistemas de ecuaciones, fracciones parciales\nProgresiones aritméticas y geométricas, sumas y productos.\n\nUnidad 4: Trigonometría\nTemas:\nÁngulos, funciones trigonométricas de ángulos agudos, funciones trigonométricas de números reales, gráficas y propiedades\nFunciones trigonométricas inversas, gráficas y propiedades, identidades y ecuaciones trigonométricas, ley de senos y cosenos\nForma polar de números complejos, productos, cocientes, raíces y potencias, Teorema de Moivre", "314028": "Unidad 1:  Lógica y conjuntos  \nTemas:\nLógica proposicional\nReglas de inferencia\nCuantificadores\nMétodos de demostración\nConjuntos \nDiagramas de Venn\nOperaciones entre conjuntos\nInducción matemática  \nEstrategias de demostración\nConjunto potencia y particiones\nRazonamiento lógico \n\nUnidad 2:  Relaciones y funciones\nTemas:\nRelaciones\nRepresentación gráfica de las relaciones\nComposición de las relaciones \nTipos de relaciones, relaciones de equivalencia, de orden parcial y n-arias\nComplejidad algorítmica, algoritmos, tasa de crecimiento    \nFunciones\nMatrices\n   \nUnidad 3:  Recursión y combinatoria   \nTemas:\nProgresiones\nRecurrencia\nRelaciones lineales homogéneas\nPrincipios de conteo\nPermutaciones\nCombinaciones\nBinomio de Newton  \nProgresiones aritméticas y geométricas\nCriterios de divisibilidad, mcm y mcd, \nProbabilidad, probabilidad condicional\nSistemas lineales \nMatriz aumentada. \nUnidad 4:  Grafos y redes  \nTemas:\nTerminología en grafos\nRepresentación de grafos\nGrafos bipartitos, isomorfismo de grafos, grafos conexos   \nCaminos y conexión, grado de un grafo, caminos eulerianos, caminos hamiltonianos \nGrafos planos, fórmula de Euler, grafos homeomorfos, árboles, redes.", "303006": "Unidad 1: Cálculo de predicados, elementos de lógica\nTemas\nCálculo proposicional\nCuantificadores\nMétodos de demostración\n\nUnidad 2: Teoría intuitiva de conjuntos\nTemas\nDefiniciones básicas\nOperaciones entre conjuntos\nRelaciones\n\nUnidad 3: Nociones de Geometría Euclidiana\nTemas\nTérminos primitivos y postulados\nTriángulos, segmentos notables y congruencia\nRectas paralelas y Perpendicularidad\nParalelogramos y cuadriláteros\nÁreas y semejanza\nCircunferencias\n\nUnidad 4: Nociones de Geometría Analítica\nTemas\nCoordenadas en el plano y espacio\nSegmentos de recta, intersección, transporte paralelo y distancia\nEcuaciones de la recta, posiciones relativas y solución de sistema lineales (de orden 2 y 3)\n\nUnidad 5: Geometría Vectorial y nociones de álgebra lineal.\nTemas\nVectores\nOperaciones entre vectores\nVectores en el plano y el espacio\nColinealidad e independencia\nÁngulo entre vectores\nProducto interno y proyección ortogonal\nNociones de matrices 2x2 y 3x3\nProducto vectorial y aplicaciones de los vectores\nCambio de coordenadas y transformaciones lineales", "303002": "Unidad 1: Pre-Cálculo\nTemas:\nLos números reales. Propiedades de campo. Propiedades de orden. \nDesigualdades. Intervalos. Inecuaciones. \nValor absoluto. Desigualdades con valor absoluto. \nEl sistema de coordenadas cartesianas. Pares ordenados. Distancia entre dos puntos del plano. Coordenadas del punto medio.\nLa línea recta. Las diferentes formas de la ecuación de una recta. Rectas paralelas y perpendiculares.\nFunciones y sus gráficas. Diferentes tipos de funciones. Dominio y rango.\nOperaciones con funciones. Desplazamientos y cambios de escala. \nDesplazamientos, alargamientos y compresiones. \n\nUnidad 2: Límites de funciones y Continuidad.\nTemas:\nNoción intuitiva del límite. Definición formal de límite.\nTeoremas sobre límites. Teorema del sándwich. Limites laterales. \nLimites que incluyen funciones trigonométricas. \nContinuidad de funciones. Continuidad en un punto. Clasificación de las discontinuidades.\nTeoremas sobre funciones continuas. Continuidad en un intervalo.\nLímites al infinito y límites infinitos.\n\nUnidad 3: La derivada.\nTemas:\nDefinición e Interpretación física y geométrica de la derivada. \nDerivada. Notación. Relación derivada-continuidad y derivada laterales. \nReglas de derivación. Regla de la cadena. \nDerivadas de orden superior. Derivación implícita.\nDerivada de las funciones trigonométricas. Derivada de funciones exponenciales y logarítmicas. \nDerivada de funciones trigonométricas inversas. Funciones hiperbólicas e hiperbólicas inversas y sus derivadas.\n\nUnidad 4: Aplicaciones de derivada\nTemas:\nVariables relacionadas. La derivada como razón de cambio.\nFormas indeterminadas y la regla de L'Hôpital. \nAsíntotas de una curva. Clasificación. Asíntotas horizontales, verticales y oblicuas. \nValores extremos de una función de variable real. Números críticos. Valores extremos relativos y absolutos.\nCriterios de la primera derivada. Puntos críticos. Criterio de la primera derivada para crecimiento -decrecimiento de una función. Criterio de la primera derivada para extremos relativos. \nCriterio de la segunda derivada. Puntos de inflexión. Criterio de la segunda derivada para concavidad. Criterio de la segunda derivada para extremos relativos.\nTrazado de curvas con todos sus elementos. \nProblemas de optimización.", "314029": "Unidad 1: Elementos de programación \nTemas\nIntroducción al curso\nLenguajes de programación\nIntroducción a Python\nTipos de datos, operadores, estructuras de datos en Python, estructuras dinámicas y estáticas\n\nUnidad 2: Estructuras de control \nTemas\nEstructuras condicionales simple y compuesta \nEstructuras condicionales múltiples, anidadas\nEstructuras de iteración definida e indefinida\n\nUnidad 3: Funciones \nTemas\nFunciones incorporadas\nMódulos, submódulos.\nDefinición de funciones, ámbito de las variables, problemas de aplicación\n\nUnidad 4: Bases de datos con SQL y visualización de datos \nTemas\nFundamentos de SQL, creación y particionamiento, filtros, funciones, subconsultas, unions, joins.", "303010": "Unidad 1: Determinantes\nTemas\nDefinición y propiedades de los determinantes. \nReducción de Gauss - Jordan y determinantes. \nMatriz adjunta y regla de Cramer. \nVolumen de un paralelepípedo.\n\nUnidad 2: Espacios vectoriales\nTemas\nDefinición de espacio vectorial y ejemplos. \nSubespacio vectorial. \nCombinación lineal y espacio generado.\nIndependencia y dependencia lineal. \nBase y dimensión de un espacio vectorial.\n\nUnidad 3:  Transformaciones lineales\nTemas\nTransformaciones lineales. \nÁlgebra de las transformaciones lineales. \nlnyectividad y sobreyectividad.\nIsomorfismos. \nMatriz de cambio de una trasformación lineal. \nPropiedades de los isomorfismos.\n\nUnidad 4: Ortogonalidad\nTemas\nDefinición y propiedades del producto interno. \nComplemento ortogonal de un subespacio. \nProyección ortogonal. \nMínimos cuadrados. \nBases Ortogonales y Ortonormales. \nProcesos Gramm - Schmidt.\n\nUnidad 5: Valores y vectores propios\nTemas\nDefiniciones y propiedades. \nMultiplicidad algebraica y geométrica. \nDiagonalización. \nDiagonalización de matrices simétricas. \nFormas cuadráticas. \nAplicaciones.", "314067": "Unidad 1: Introducción\nTemas\n   Definiciones básicas\n   Historia\n   Tipos de datos\n\nUnidad 2: Estadística Descriptiva Univariada\nTemas\n   Distribuciones de frecuencias\n   Medidas descriptivas\n\nUnidad 3: Curvas De Densidad Y Distribución Normal\nTemas\n   Distribución normal\n   Cálculo de proporciones\n   Cálculo de percentiles\n\nUnidad 4: Estadística Descriptiva Bivariada\nTemas\n   Distribuciones conjuntas y marginales\n   Dependencia estadística\n\nUnidad 5: Regresión\nTemas\n   Ecuación de regresión ajustada\n   Interpretación de los coeficientes de la ecuación de regresión\n   Error o residual\n   Valores predichos\n   Coeficiente de determinación\n   Coeficiente de correlación", "303005": "Unidad 1: Nombre: Antiderivada y Técnicas de Integración.\nTemas\nFunción Primitiva o Antiderivada. La integral indefinida definición y notación.\nFórmulas de la integración. Propiedades de la integral indefinida. \nMétodos de integración: Regla de sustitución (cambio de variables), Integración por partes. Integración de potencias de funciones trigonométricas, Sustituciones trigonométricas, descomposición en fracciones parciales, Sustituciones para racionalizar.\n\nUnidad 2: Nombre: Integral Definida\nTemas\nLa integral definida. La notación sumatoria (notación sigma).\nSumas de Riemann. Definición de la integral definida según Riemann. Teorema: continuidad implica integrabilidad. Análisis del recíproco.\nPropiedades de la integral definida y sus generalizaciones. Propiedades que ayudan a simplificar la integral. Funciones pares e impares.\nLos teoremas fundamentales del cálculo. Teorema del valor medio para integrales.\nIntegrales impropias\n\nUnidad 3: Nombre: Aplicaciones de la Integral\nTemas\nÁreas entre curvas.\nVolúmenes de sólidos: Método de secciones planas. Volúmenes de sólidos de revolución: método de los discos, método de las arandelas, método de la corteza cilíndrica. Longitud de arco de una curva plana y área de superficie de revolución.\nMomentos y centros de masa de una barra, centroide de una región plana. Los teoremas de Pappus\n\nUnidad 4: Nombre: Sucesiones y Series\nTemas\nSucesiones y series. Sucesiones, definición y límite de una sucesión, clasificación y teoremas sobre límites de sucesiones.\nSeries numéricas.  Propiedades. Serie geométrica. Serie telescópica. Criterios de convergencia y divergencia de series. Criterio del término n-ésimo para divergencia. Criterio de la integral. Criterios de comparación. Comparación en el límite. Criterio del cociente y de la raíz, criterio de Raabe.\nSeries alternantes, convergencia absoluta y condicional. Criterio del cociente y de la raíz para convergencia absoluta.\nSeries de potencia. Representación de funciones por series de potencias. Formula de Euler. Cálculo con series de potencias. La serie binomial.", "314047": "Unidad 1:  La planeación de una Encuesta\nTemas\n   Definiciones básicas de Encuesta: objetivos y necesidades, antecedentes, periodo de referencia y de\n   observación, universo y población de estudio, unidades de análisis e informantes.\n   Traducción de objetivos en indicadores estadísticos y plan de tabulación (desagregación de \n    resultados), cuadros de salida.\n\nUnidad 2:  El diseño temático, estadístico, informático y operativo de una Encuesta  \nTemas\n  El diseño temático\n  El formulario o cuestionario, diseño, estructura, contenido, tipos de pregunta/respuesta y flujogramas.\n  El diseño estadístico\n  El plan muestral para una encuesta por muestreo probabilístico, definiciones básicas, variables,   \n  parámetros para estimar, unidades estadísticas y marco de muestreo.\n  Diseño y selección de muestra, estimadores relacionados (Estrategias muestrales).  Diseños no  \n  proporcionales y proporcionales de elementos, de conglomerados y estratificados.\n  Metodologías de estimación, indicadores de precisión, confiabilidad e intervalos de confianza. Tamaños\n  de muestra.\n  El diseño operativo\n  Organigrama, distribución de cargas de trabajo y prueba piloto.\n\nUnidad 3:  La ejecución del operativo de campo y el procesamiento de datos\nTemas\n   Pre-operativo de campo, preparación de cartografía, manuales y formatos de recolección.\n   El Operativo de campo. Ejecución, recolección de datos de la investigación. Control y supervisión,   \n   seguimiento de reportes de cobertura.\n   Procesamiento, ingreso de datos, depuración, validación, consistencia, imputación y consolidación de \n   información.\n   Estudio de datos a nivel muestra y comparación con otras fuentes. Ajustes al factor básico de   \n   expansión y ajustes de cobertura.\n   Obtención de cuadros de salida, intervalos de confianza y estimaciones con sus correspondientes \n   indicadores precisión (errores de muestreo)\n\nUnidad 4:  El análisis de la información y preparación para entrega de resultados   \nTemas\n   Análisis de los cuadros de salida, estimaciones y errores de muestreo.\n   Análisis de contexto, de cobertura, indicadores temáticos y de calidad\n   Ajustes finales, ficha técnica e informe de resultados.\n   Productos para entregar, documentación, metodología estadística, ficha técnica, cuadros de salida e \n   informe de resultados.", "314068": "Unidad 1: Muestreo\nTemas\n   Conceptos básicos: Población, muestra.\n   Algunos métodos de muestreo: muestreo a conveniencia, subjetivo, muestreo aleatorio simple.\n   Métodos para seleccionar una muestra aleatoria simple.  Error muestral.\n   Definición parámetro, estadístico.\n   Breve introducción al concepto de estimación puntual, distribución muestral, margen de error e intervalos de confianza y su conexión con el muestreo.\n   \nUnidad 2: Diseño de Experimentos\nTemas\n   Estudios observacionales y experimentales.\n   Conceptos básicos del diseño: variable, variable de respuesta, factor, nivel, unidad experimental, tratamientos.\n   Diseño completamente aleatorizado (DCA), esquema de un DCA, principios del diseño.\n   Diseño de bloques aleatorizado.  Diseños por pares.\n\nUnidad 3:  Introducción a la Probabilidad\nTemas\n   La idea de probabilidad.\n   Conceptos básicos: espacio muestral, evento.\n   Probabilidad de un evento.\n   Reglas de la probabilidad.\n   Modelos de probabilidad (discreto y continuo).\nUnidad 4:  Distribuciones Muestrales\nTemas\n   Introducción a las distribuciones muestrales.\n   Distribución muestral la media muestral.\n   Distribución muestral de la proporción muestral.\n   Propiedades de los estimadores.\n   Cálculo de probabilidades. \n   Teorema del límite central.\n   \nUnidad 5:  Introducción a la inferencia estadística\nTemas\n   La idea de la inferencia estadística.\n   Margen de error y estimación por intervalos.\n   Definición de un intervalo de confianza.\n   Interpretación de un intervalo de confianza.\n   Construcción de un intervalo de confianza.\n   Intervalos de confianza para la media poblacional (bajo normalidad y varianza conocida).\n      \nUnidad 6:  Pruebas de Hipótesis\nTemas\n   Introducción, la idea de una prueba de hipótesis.\n   Términos básicos: hipótesis nula, hipótesis alternativa.\n   Clases de hipótesis.\n   Procedimiento para realizar una prueba de hipótesis (definir: estadístico de prueba o contraste, valor-p,   \n   nivel de significancia).\n   Prueba de hipótesis para la media con varianza conocida.", "303009": "Unidad 1: Ecuaciones paramétricas y coordenadas polares, cilíndricas y esféricas\nTemas:\nParametrización de curvas planas, sistema de coordinadas polares, cilíndricas y esféricas\nCálculo con curvas paramétricas, longitud de curva, curvatura y sus aplicaciones.\nTrazado de curvas y superficies en el espacio y curvas de nivel.\n\nUnidad 2: Nombre: Límites, Diferenciabilidad y aplicaciones\nTemas:\nLímites y continuidad\nDerivadas parciales\nRegla de la cadena\nDerivadas Direccionales y vector gradiente\nPlanos tangentes y diferenciales\nValores extremos y puntos de silla\nMultiplicadores de Lagrange\n\nUnidad 3: Nombre: Integrales múltiples\nTemas:\nIntegrales dobles e iteradas sobre rectángulos\nIntegrales dobles sobre regiones generales\nIntegrales dobles y áreas\nIntegrales dobles en coordinadas polares\nIntegrales triples en coordenadas rectangulares, cilíndricas y esféricas\nMomentos y centros de masa\nTeorema del cambio de variable\n\nUnidad 4: Nombre: Campos vectoriales e integración sobre campos vectoriales\nTemas:\nIntegrales de línea\nCampos vectoriales e integrales de línea:  Independencia de la trayectoria, campos conservativos y funciones potenciales\nTeorema de Green\nIntegrales de superficie\nTeorema de Stokes\nTeorema de la Divergencia", "303013": "Unidad 1: Ecuaciones diferenciales de primer orden \nTemas\nDefinición de ecuación diferencial y orden de una ecuación diferencial. Clasificación de las ecuaciones diferenciales: \ttipo, orden y linealidad.\nDefinición de solución, definición de solución general y solución particular, problema de valor inicial.\nTeorema de Existencia y unicidad.\nEcuaciones diferenciales de primer orden: Ecuaciones lineales, Ecuaciones separables, Ecuaciones homogéneas, Ecuaciones exactas, teoremas sobre exactas y factores integrantes, Ecuación de Bernoulli. Sustituciones varias. \n\nIdentificar las diferentes ecuaciones diferenciales con los diferentes métodos para resolverlas. \n\nUnidad 2: Aplicaciones de las Ecuaciones diferenciales de primer orden \nTemas\nAplicaciones geométricas (trayectorias isogonales y ortogonales, problemas de persecución y problemas de geometría analítica).\nProblemas de crecimiento y decrecimiento exponencial.\nProblemas de mezclas químicas. Problemas de vaciado de tanques.\nCircuitos. Problemas de aplicación a la física.\nConstruir la ecuación diferencial que modele cada problema planteado y resolverla por los métodos de la unidad anterior.\n\nUnidad 3: Teoría de las Ecuaciones lineales de primer orden\nTemas\nConceptos básicos, espacio C(I), C'(I), C''(I), etc., funciones linealmente dependientes e independientes, Wronskiano y teoremas sobre la dimensión del espacio solución de una Ecuaciones diferenciales  homogénea, Método de reducción de orden.\nSoluciones fundamentales de las ecuaciones lineales homogéneas. \nEcuaciones homogéneas con coeficientes constantes. Ecuación característica.\nEcuación no homogénea: Método de los coeficientes indeterminados.  Método de variación de parámetros. \nMétodo de los operadores inversos.\nAplicaciones de las ecuaciones diferenciales de segundo orden: Vibraciones mecánicas y eléctricas, vibraciones forzadas. \n\nIdentificar las ecuaciones homogéneas y los diferentes métodos para resolverlas. \nResolver la ecuación característica con el objetivo de hallar un conjunto de soluciones. \nAplicar el método de los coeficientes indeterminados, variación de parámetros y operadores inversos. \nIlustrar la utilidad de estos métodos para resolver problemas del área de física e ingeniería.\n\nUnidad 4: Solución por Series\nTemas\nRefrescar el concepto de serie y las propiedades de las series. \nDefinición de punto ordinario y solución de una ecuación diferencial alrededor de un punto ordinario. \nDefinición de punto singular y solución alrededor de un punto singular, teorema de Frobenius, ecuación de índices y los tres casos que surgen con las raíces indiciales. \nFunción gamma y teoremas relativos.\nEcuación diferencial de Bessell y propiedades de la función de Bessell\n\nUsar los métodos de series para resolver Ecuaciones Diferenciales con coeficientes variables.\n\nUnidad 5: Transformada de Laplace \nTemas\nDefinición de Trasformada de Laplace y trasformada inversa de Laplace y la tabla de las principales fórmulas de trasformada y trasformada inversa de Laplace, ejemplos.\nTeoremas de trasformada de Laplace: teorema de existencia de la trasformada de Laplace, primer teorema de traslación, segundo teorema de traslación, teorema de la derivada de una trasformada, teorema de la trasformada de una derivada, teorema del producto convolutivo y trasformada de la integral, teorema de la generalización de la trasformada de una potencia con exponente real, teorema de la trasformada de una función periódica.\nAplicaciones de la trasformada a Ecuaciones diferenciales lineales de coeficientes constantes o variables y a ecuaciones Integrales y ecuaciones integro-diferenciales.\nFunción Impulso Unitario o Delta de Dirac, sus propiedades y su trasformada de Laplace, aplicación a Ecuaciones diferenciales que contengan la función Delta-Dirac \n\nUtilizar la Trasformada de Laplace como método alternativo para resolver Ecuaciones Diferenciales con condiciones iniciales, ecuaciones integrales o integrodiferenciales", "303313": "Unidad 1: Función de probabilidad\nTemas\nEspacio muestral, eventos\nAxiomas de la función de probabilidad\nProbabilidad clásica y probabilidad frecuentista\nTécnicas básicas de conteo\nTeorema de Bayes\nIndependencia de eventos    \n\nUnidad 2:  Variable aleatoria\nTemas\nDefinición y tipos de variables aleatorias\nFunción de distribución acumulada\nFunción de densidad de probabilidad\nValores esperados\nDesigualdades importantes\n  \nUnidad 3:   Distribuciones de probabilidad especiales\nTemas\nDistribuciones discretas: Bernoulli, Binomial, Poisson, Geométrica, Hipergeométrica, Binomial negativa, Uniforme\nDistribuciones continuas:  Uniforme, Exponencial, Gamma, Chi-cuadrada, Normal\n\nUnidad 4:   Distribuciones de varias variables   \nTemas\nDistribuciones conjuntas discretas y continuas\nDistribución marginal y condicional\nEsperanzas condicionales\nIndependencia entre variables \n\nUnidad 5:   Distribución de funciones de variables aleatoria   \nTemas\nTécnica de la función de distribución acumulada\nTécnica de la transformación para variables continuas\nTécnica de la función generadora de momentos\nEstadísticos de orden.", "314069": "1. Métodos iterativos de resolución de ecuaciones no lineales (punto fijo,\nbisección, método de regula-falsi, secante, método de Newton-\nRaphson)\n2. Métodos directos e iterativos de resolución de sistemas de ecuaciones\nlineales.\n3. Interpolación\n4. Integración numérica\n5. Diferenciación numérica\n6. Resolución de ecuaciones diferenciales ordinarias\n7. Matrices estocásticas y cadenas de Markov", "314306": "Unidad 1:  Definición y propiedades de Procesos estocásticos, Paseo aleatorio\nTemas\nDefiniciones básicas y propiedades de procesos estocásticos.\nPaseo aleatorio sobre Z. Recurrencia y Transitoriedad. \nProblema Ruina del Jugador.\n\nUnidad 2:   Cadenas de Markov a tiempo discreto\nTemas\nDefiniciones básicas.\nProbabilidades de transición.  \nEvolución de las distribuciones. \nClasificación de estados. \nDistribuciones Límites y distribuciones estacionarias. \nAplicaciones.\n \nUnidad 3:   Proceso de Poisson\nTemas\nDefiniciones y propiedades.\nGeneralizaciones del Proceso de Poisson.\nAplicaciones. \n\nUnidad 4:    Cadenas de Markov a tiempo continúo\n   Temas\nProbabilidades de transición. Ecuaciones de Kolmogorov. \nDistribuciones límites y estacionarias. \nProcesos de nacimiento y muerte. \nAplicación a Teoría de Filas.", "314070": "Unidad 1:   Distribuciones límite y distribuciones muestrales\nTemas\n Sucesiones de variables aleatorias \nTeorema del límite central\nAproximaciones para la distribución binomial\nDistribuciones asintóticas\nPropiedades de convergencia estocástica\nTeoremas límite adicionales \nDistribuciones muestrales \nDistribuciones t, F y beta, aproximaciones para grandes muestras.\n\nUnidad 2:  Teoría de los estimadores\nTemas\nAlgunos métodos de estimación\nCriterios para la evaluación de estimadores, \nPropiedades asintóticas\nEstadísticos suficientes y sus propiedades\nCompletez\nFamilia exponencial de distribuciones.\n  \nUnidad 3:   Intervalos de confianza y pruebas de hipótesis\nTemas\nDefinición de intervalo de confianza\nMétodo de la cantidad pivotal\nMétodo general \nProcedimientos sobre dos poblaciones\nConceptos básicos sobre pruebas de hipótesis\n Procedimientos con hipótesis compuestas\nPruebas para los parámetros de la distribución normal\nPruebas más potentes\nPruebas uniformemente más potentes \nPruebas basadas en la verosimilitud.\n        \nUnidad 6:  Pruebas de Hipótesis\nTemas\n   Introducción, la idea de una prueba de hipótesis.\n   Términos básicos: hipótesis nula, hipótesis alternativa.\n   Clases de hipótesis.\n   Procedimiento para realizar una prueba de hipótesis (definir: estadístico de prueba o contraste, valor-p,   \n   nivel de significancia).\n   Prueba de hipótesis para la media con varianza conocida.", "314210": "Unidad 1: Muestreo aleatorio simple\nTemas\nIntroducción al muestreo.  Ideas básicas de muestreo y estimación.  Tipos de error.  Muestreo probabilístico.  Tipos de variable.  Parámetros.  Estimadores.\nMuestreo aleatorio simple (M.A.S.).  Estimación de medias, totales.\nMuestreo aleatorio simple con reemplazamiento.\nIntervalos de confianza.  Estimación de errores de muestreo.  Tamaño de la muestra para estimar la media y el total.  Aspectos del problema del tamaño muestral.  Estimación preliminar de varianzas poblacionales.  Precisión relativa.\nEstimación de proporciones.  Tamaño muestral para proporciones y varias proporciones simultáneamente.\nMuestreo con probabilidades desiguales.  Estimador de Horvitz y Thompson.\n\nUnidad 2:  Muestreo estratificado\nTemas\nMuestreo aleatorio estratificado (M.A.E.).  Ventajas con respecto al muestreo aleatorio simple.  Estimación de medias totales y proporciones.\nAfijación de la muestra.\nTamaño de muestra para medias, totales y proporciones.\nPostestratificación.\nEl problema de la formación de estratos.  Elección del número de estratos.  \n\nUnidad 3:  Muestreo sistemático\nTemas\nMuestreo sistemático (M.S.).  Ventajas, desventajas.\nEstimación de medias, totales y proporciones.  \nEfectos de la correlación intraclase.\nEstimación de varianzas.  \nTamaño de muestra.\n\nUnidad 4:    Estimadores de razón y de regresión    \nTemas\nEstimadores de razón.  Varianza de los estimadores.\nSesgo en los estimadores de razón.\nEstimadores de razón en muestreo estratificado.  Estimadores de regresión lineal.\nComparación de los estimadores de regresión y de razón.\n\nUnidad 5:    Muestreo por conglomerados    \nTemas\nMuestreo por conglomerados.  Conglomerados iguales.  Estimación de la media y totales poblacionales.  Estimación de proporciones.  Tamaño muestral.\nConglomerados de tamaños diferentes. Selección con probabilidades proporcionales al tamaño.  Estimadores de la media y la varianza. \n\nUnidad 6:    Muestreo polietápico    \nTemas\nIntroducción.  Muestreo aleatorio simple en cada etapa.  Estimadores insesgados para el total y la razón.\nUnidades primarias de selección con probabilidad proporcional al tamaño.  Unidades primarias seleccionadas con probabilidades desiguales.\nCostos y tamaños maestrales.  Cálculo general de varianzas y errores de estimación.\nMuestreo Doble: Introducción.  Estimación de la razón.  Asignación muestral para la estimación de la razón.\nMuestreo Doble por Estratificación.  Ajuste para no-respuesta en encuestas.  Deducción de algunos resultados.\n\nUnidad 7:    Otros métodos de muestreo    \nTemas\nMuestreo neuronal (multiplicidad).\nLíneas transectas y gráficos variables circulares.\nMuestreo de captura y recaptura.  Predicción espacial.\nDiseños de muestreo adaptativo.  Imputación de datos faltantes.\nMétodo de la respuesta aleatorizada.  Regresión con datos de encuestas complejas.", "314302": "Aprender la metodología para generar variables aleatorias discretas y continuas utilizando el software R o Python. \nAprender los conceptos de algunos procesos estocásticos como los procesos de Poisson homogéneos y no homogéneos, y cómo se generan estos utilizando el software R o Python. \nAprender los conceptos y la forma cómo trabajar los métodos de reducción de varianza en el software R o Python.\nEstudiar las técnicas:  Bootstrap, validación estadística y la forma como se trabajan en el software R o Python.\nAprender la técnica Monte Carlo con cadenas de Markov, y la forma de generar cadenas de Markov utilizando algunos algoritmos conocidos en la literatura, como el algoritmo Hastings-Metropolis, y el muestreador de Gibbs.\n\nUnidad 1: Números aleatorios\nTemas:\nGeneración de números pseudoaleatorios.\nUso de números aleatorios para evaluar integrales.\n\nUnidad 2: Generación de variables aleatorias discretas\nTemas:\nMétodo de la transformada inversa.\nGeneración de una variable aleatoria Poisson.\nGeneración de variables aleatorias binomiales.\nLa técnica de aceptación y rechazo.\nEl método de composición.\n  \nUnidad 3: Generación de variables aleatorias continuas\nTemas:\nEl algoritmo de la transformada inversa.\nEl método de  aceptación y  rechazo.\nEl método de la composición.\nEl método polar para generar variables aleatorias normales.\nGeneración de un proceso Poisson homogéneos.\nGeneración de un proceso Poisson no homogéneo.\n\nUnidad 4: El método de simulación por medio de eventos discretos\nTemas:\nSimulación mediante eventos discretos.\nSistema de línea de espera con un servidor. \nSistema de línea de espera con dos servidores en serie. \nSistema de línea de espera con dos servidores en paralelo. \nModelo de inventario. \nProblema de reparación.  \nEjercicio de opciones en acciones. \nVerificación del modelo de simulación.\n\nUnidad 5:  Análisis estadístico de datos simulados\nMedia y varianza muestrales. \nEstimación del intervalo de una media poblacional. \nLa técnica bootstrap.\n La técnica bootstrap para estimar errores cuadráticos medios.\n\nUnidad 6: Reducción de varianza y validación estadística\nTemas:\nEl uso de variables antitéticas. \nEl uso de variables de control. \nReducción de varianza mediante condicionamiento. \nMuestreo estratificado. \nMuestreo de importancia. \nUso de números aleatorios comunes. \n\nUnidad 7: Técnicas de validación estadística\nTemas:\nPruebas de bondad de ajuste. \nPrueba de bondad de ajuste ji-cuadrada para datos discretos.\nPrueba de Kolmogorov-Smirnov para datos continuos.\nPruebas de bondad de ajuste sin parámetros especificados.\nEl problema de las dos muestras.\nValidación de la hipótesis de un proceso Poisson no homogéneo.\n\nUnidad 8: Métodos de Monte Carlo con cadenas de Markov \nTemas:\nCadenas de Markov.\nEl algoritmo de Hastings-Metropolis.\nEl muestreador de Gibbs.\nTemple simulado.\nEl algoritmo de muestreo con remuestreo de importancia.", "314405": "Unidad 1: Conceptos preliminares\nTemas\n   Organización de datos multivariados\n   Técnicas gráficas, \n   Interpretaciones geométricas, \n   Distancia estadística, \n   Vectores y matrices aleatorias.\n   \nUnidad 2: Distribución normal multivariada\nTemas\n   Definición y propiedades de la distribución normal multivariada\n   Distribución de formas cuadráticas\n   Estimación por máxima verosimilitud\n   Distribuciones muestrales, \n  Evaluación de normalidad multivariada,\n  Detección de datos atípicos.\n   \nUnidad 3:  Inferencia y pruebas de hipótesis sobre vectores de medias  \nTemas\n   Regiones de confianza\n   Prueba de razón de verosimilitudes \n   Intervalos de confianza simultáneos\n   Inferencia basada en muestras grandes \n   Comparación de varios vectores de medias.\n   \nUnidad 4:  Temas especiales  \nTemas\n   Distribuciones elípticas\n   Regresión con respuesta multivariada\n   Datos faltantes\n   Algoritmo EM.", "314313": "Unidad 1:  Introducción a la estadística no paramétrica\nTemas\nConceptos fundamentales: Notación y antecedentes, Conjuntos de confianza, Desigualdades útiles.\n  \nUnidad 2: Pruebas de aleatoriedad\nTemas\n   Pruebas basadas en el número de ejecuciones y pruebas basadas en la longitud de la ejecución más larga\n   Prueba basada en rangos\n   Extensión de la prueba de la media control\n   Test ANOVA de una vía: Kruskal-Wallis y comparaciones múltiples\n   Otras pruebas estadísticas de rango\n   Comparación con un control\n   Prueba Chi-Cuadrado para k proporciones.\n  \nUnidad 3:  Pruebas de bondad de ajuste\nTemas\n   Prueba Chi-cuadrado de bondad de ajuste\n   Kolmogorov-Smirnov una muestra\n   Prueba Lillietors para normalidad\n   Extensión de la prueba de la media control\n  Test ANOVA de una vía: Kruskal\n  Wallis y comparaciones múltiples\n  Otras pruebas estadísticas de rango\n  Comparación con un control\n  Prueba Chi-Cuadrado para k proporciones.\n  Intervalos de confianza y pruebas de hipótesis para un cuantíl poblacional\n  Prueba Signo e intervalo de confianza para la media\n  Estadísticos de orden y rango, Tratamiento de empates en pruebas de rango\n  Extensión de la prueba de la media control\n Test ANOVA de una vía: Kruskal-Wallis y comparaciones múltiples.\n  Otras pruebas estadísticas de rango.\n  Comparación con un control\n  Prueba Chi-Cuadrado para k proporciones \n\nUnidad 4:  El problema general de dos muestras \nTemas\n   Prueba de Wald-Wolfowitz\n   Prueba para dos muestras de Kolmogorov-Smirnov\n   Prueba de la mediana y de la mediana con una muestra de control,\n   Prueba U de Mann- Witney\n\nUnidad 5:  Pruebas de igualdad de k muestras independientes  \nTemas\n   Extensión de la prueba de la media\n   Extensión de la prueba de la media control\n   Test ANOVA de una vía: Kruskal-Wallis y comparaciones múltiples.\n   Otras pruebas estadísticas de rango\n   Comparación con un control", "314030": "Unidad 1:  Modelos de Regresión Lineal MRL\nTemas\n   Presentación del curso, aplicaciones, introducción a R o Python.\n   Elementos de álgebra matricial.\n   Modelos de Regresión Lineal, definición, notación, interpretación de parámetros.\n   MRL, representación estocástica, método de mínimos cuadrados MMC, interpretación geométrica del MMC.    \n   MRL, valores ajustados, residuales, matriz sombrero, propiedades, ejemplos.\n   Clase práctica en R o Python.\n\nUnidad 2:  Modelos de Regresión Lineal Normal MRLN\n Temas\n   MRLN\n   MRLN Inferencia, sumas cuadráticas, coeficientes de determinación y de correlación.\n   Intervalos de confianza y pruebas de hipótesis asociadas al MRLN.\n   Pruebas de Hipótesis asociadas al MRLN.\n   Pruebas de Hipótesis asociadas al MRLN, ANOVA\n   Clase práctica en R o Python.\n   Extrapolación oculta y clase práctica. \n   Clase práctica en R o Python.\n\nUnidad 3:  Diagnóstico en el MRLN\nTemas\n   Diagnóstico de multicolinealidad y medidas remediales. \n  Análisis de residuales, pruebas de hipótesis sobre los residuales.\n  Análisis de gráficos en el diagnóstico de los residuales. Transformaciones\n  Identificación de observaciones influenciales.\n  Criterios de selección.\n  Clase práctica en R o Python. Implementación con datos.\n  \n Unidad 4: Modelos de regresión no lineal\nTemas\n   Modelos con una o más variables cualitativas. \n   Modelos polinómicos y con efecto de interacción.\n   Medidas remediales para varianza de error no homogénea (Mínimos cuadrados ponderados). \n   Medidas remediales para casos de puntos influenciales (regresión robusta). Validación de modelos.\n   Modelos de regresión no lineal. \n   Modelos de regresión logística", "303029": "Unidad 1: Exploración de la actividad investigativa en la Universidad\nCentros de investigación de la Universidad de Antioquia, Grupos de investigación, Clasificación de los grupos de investigación, clasificación de los proyectos de investigación.\n\nUnidad 2: Búsqueda de la Información\nIntroducir al estudiante en la búsqueda de información en bases de datos. Explorar diferentes bases de datos matemáticas y estadísticas.\n\nUnidad 3: Escritura de documentos en LATEX\nIntroducción a la edición de documentos científicos en latex.\n\nUnidad 4: Elaboración del proyecto de trabajo de grado\nDefinición y formulación del trabajo de grado, planteamiento del problema, objetivos, metodología, marco teórico, cronograma. Referencias bibliográficas. Redacción de las distintas partes que componen el texto del proyecto de trabajo de grado. Presentación del proyecto de investigación.\nNota: Las unidades 3 y 4 se realizan simultáneamente, ya que se busca que el estudiante, al finalizar el curso, elabore el texto completo de Proyecto de trabajo de grado. El estudiante debe invertir varias horas en un trabajo de consulta bibliográfica, conversación sobre el tema o problema a trabajar con su eventual asesor y redacción de las distintas partes que compondrán el texto de su proyecto de grado. Por esta razón el curso se clasifica como teórico-práctico: 2 horas teóricas, 2 horas prácticas. De manera transversal a todas las actividades el estudiante debe hacer un curso LaTex que es la escritura básica en matemáticas.", "314415": "Unidad 1:  Análisis de componentes principales y análisis factorial\nTemas\nComponentes principales poblacionales\nVariabilidad muestral explicada\nAnálisis gráfico de las componentes principales\nBiplot\nResultados asintóticos\nModelo factorial ortogonal\nMétodos de estimación en el análisis factorial\nRotación de factores\nPuntuaciones factoriales\n  \nUnidad 2:  Análisis de correlación canónica, análisis de clasificación y discriminación\nTemas\nVariables canónicas y correlaciones\nInterpretaciones de variables canónicas\nMedidas descriptivas e inferencia asintótica asociadas al análisis factorial\nClasificación de poblaciones\nFunciones de clasificación\nFunciones discriminantes \n   \nUnidad 3: Análisis de Conglomerados, medidas de similaridad y ordenamiento  \nTemas\nMedidas de similaridad\nAgrupamiento jerárquico y no-jerárquico\nEscalamiento multidimensional\nAnálisis de correspondencias\nBiplot\nAnálisis de Procrustes\n   \nUnidad 4:  Tópicos especiales   \nTemas\nClasificación logística\nÁrboles de clasificación y regresión\nRedes neuronales\nMétodos no-paramétricos.", "314062": "Unidad 1: Probabilidad e inferencia posterior\nTemas\nDefinición de conceptos básicos\nProbabilidad condicional \nRegla de bayes \nVerosimilitud \nDensidad a priori y posterior \nPredicción \nProbabilidad como una medida de incertidumbre.\n\nUnidad 2: Modelos de un solo parámetro  \nTemas\nModelo binomial\nDistribuciones prior-informativas y no informativas \nModelo para los parámetros de la distribución normal \nModelo Poisson \nModelo Exponencial.\n\nUnidad 3: Introducción a modelos de múltiples parámetros\nTemas\nModelo normal\nModelo multinomial para datos categóricos \nOptimización bayesiana y estocástica.\n\nUnidad 4: Introducción a la computación bayesiana\nTemas\nSimulación Monte Carlo vía Cadenas de Markov (MCMC)\n Algoritmo Metropolis-Hastings \nMuestreo de Gibss.", "314311": "Unidad 1:  Introducción\nTemas\n   Estudios observacionales y experimentales.\n   Definición del diseño estadístico de experimentos.\n   Conceptos básicos.\n   Breve historia del diseño estadístico.\n   Fases del diseño experimental.\n   Principios del diseño experimental.\n\nUnidad 2:  Experimentos con un solo factor\nTemas\n   Diseño completamente aleatorizado.\n   Principios del Análisis de Varianza (ANOVA).\n   Modelo de efectos fijos.\n   Validación de supuestos.\n   Comparaciones múltiples.\n   Comparaciones por contrastes.\n   Modelo de efectos aleatorios.\n   Potencia y tamaño de muestra en ANOVA.\n\nUnidad 3:  Diseños de bloques y otros\nTemas\n   Diseño de bloques completos aleatorizados.\n   Análisis estadístico del diseño de bloques.\n   Verificación de supuestos.\n   Eficiencia de un diseño de bloques.\n   Diseño de cuadrado latino.\n   Diseño de cuadrado grecolatino.\n   Diseño de bloques incompletos balanceados.\n\nUnidad 4:  Experimentos factoriales  \nTemas\n   Conceptos básicos.  Ventajas de los diseños factoriales.\n   Diseño factorial de dos factores.\n   Diseño factorial de tres factores.\n   Diseño factorial general.\n   Formación de bloques en un diseño factorial.\n   Modelos de efectos aleatorios.\n   Modelos de efectos mixtos.\n   \nUnidad 5:   Diseños factoriales 2^k y fraccionados\nTemas\n   Diseño 2^2, diseño 2^3\n   Diseño 2^k\n   Diseños con una sola réplica.\n   Diseños con puntos centrales.\n   Diseño Factorial Fracción 2^k-1. Resolución y construcción de fracciones 2^k-1.\n   Diseño Factorial Fracción 2^k-2. Resolución y construcción de fracciones 2^k-2\n   \n  Unidad 6:   Métodos de superficies de respuesta\nTemas\n   Intr function showSaberes(code) {
  const nc = code.replace(/^0+/, '');
  const panel  = document.getElementById('saberes-panel');
  const titleEl = document.getElementById('saberes-title');
  const bodyEl  = document.getElementById('saberes-body');
  const box  = document.querySelector('.course-box[data-code="' + code + '"]');
  const name = box ? box.getAttribute('data-name') : code;
  titleEl.textContent = name + '  (' + code + ')';
  if (SABERES[nc]) {
    bodyEl.textContent = SABERES[nc];
    bodyEl.classList.remove('no-data');
  } else {
    bodyEl.textContent = 'No hay microcurrículo registrado para este curso.';
    bodyEl.classList.add('no-data');
  }
  panel.classList.add('visible');
}

function hideSaberes() {
  document.getElementById('saberes-panel').classList.remove('visible');
}

document.getElementById('saberes-close').addEventListener('click', hideSaberes);

// Parcheo aditivo: showChain también abre el panel
const __origShowChain = showChain;
showChain = function(code) { __origShowChain(code); showSaberes(code); };

// Parcheo aditivo: clearAll también cierra el panel
const __origClearAll = clearAll;
clearAll = function() { __origClearAll(); hideSaberes(); };

// Arrastre del panel por el header
(function() {
  const panel  = document.getElementById('saberes-panel');
  const header = document.getElementById('saberes-header');
  let dragging = false, ox = 0, oy = 0;
  header.addEventListener('mousedown', function(e) {
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    let nx = e.clientX - ox;
    let ny = e.clientY - oy;
    nx = Math.max(0, Math.min(nx, window.innerWidth  - panel.offsetWidth));
    ny = Math.max(0, Math.min(ny, window.innerHeight - panel.offsetHeight));
    panel.style.right  = 'auto';
    panel.style.bottom = 'auto';
    panel.style.left   = nx + 'px';
    panel.style.top    = ny + 'px';
  });
  document.addEventListener('mouseup', function() { dragging = false; });
})();

</script>
