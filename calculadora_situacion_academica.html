<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Situación Académica - UdeA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            background: #1e293b;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 100%;
            padding: 14px;
            color: #f8fafc;
        }

        h1 {
            color: #f8fafc;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .section {
            margin-bottom: 10px;
        }

        .section-title {
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 6px;
            font-size: 1rem;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 2px;
        }

        .courses-container {
            margin-bottom: 6px;
        }

        .course-row {
            display: grid;
            grid-template-columns: 65px 1fr 1fr 32px;
            gap: 5px;
            margin-bottom: 5px;
            align-items: center;
        }

        .course-label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .course-row input {
            padding: 5px;
            background-color: #334155;
            color: #f8fafc;
            border: 1px solid #475569;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: all 0.2s;
            width: 100%;
            min-width: 0;
        }

        .course-row input::placeholder {
            color: #94a3b8;
        }

        .course-row input:focus {
            outline: none;
            border-color: #3b82f6;
            border-width: 2px;
            padding: 4px;
        }

        .course-row input.error {
            border-color: #f87171;
        }

        .remove-btn {
            background: #f87171;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .remove-btn:hover {
            background: #ef4444;
        }

        .add-course-btn {
            background: #92cdae;
            color: black;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            width: 100%;
            transition: background 0.2s;
            font-weight: 600;
        }

        .add-course-btn:hover:not(:disabled) {
            background: #7abf9b;
        }

        .add-course-btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .parameter-group {
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .parameter-label {
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .radio-group {
            display: flex;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .radio-option input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0;
        }

        .radio-option label {
            cursor: pointer;
            font-size: 0.95rem;
        }

        input[type="number"] {
            padding: 5px;
            background-color: #334155;
            color: #f8fafc;
            border: 1px solid #475569;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 65px;
            text-align: center;
            transition: all 0.2s;
        }

        input[type="number"]::placeholder {
            color: #94a3b8;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #3b82f6;
            border-width: 2px;
            padding: 4px;
        }

        .parameters-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            padding: 10px 12px;
            border-radius: 6px;
        }

        .results {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #334155;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .result-value {
            font-weight: 700;
            font-size: 1.05rem;
            color: #f8fafc;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-normal {
            background: #92cdae;
            color: black;
        }

        .status-prueba {
            background: #fcd34d;
            color: black;
        }

        .status-deficiente {
            background: #f87171;
            color: black;
        }

        .status-insuficiente {
            background: #ef4444;
            color: white;
        }

        @media (max-width: 600px) {
            .calculator {
                padding: 12px;
            }

            h1 {
                font-size: 1.15rem;
                margin-bottom: 8px;
            }

            .course-row {
                grid-template-columns: 55px 1fr 1fr 30px;
                gap: 5px;
            }

            .course-label {
                font-size: 0.9rem;
            }

            .course-row input {
                padding: 4px;
                font-size: 0.9rem;
            }

            .remove-btn {
                width: 30px;
                height: 26px;
            }

            .section-title,
            .parameter-label,
            .radio-option label,
            .result-label {
                font-size: 1.05rem;
                font-weight: bold;
            }

            .result-value {
                font-size: 1.2rem;
                font-weight: bold;
            }

            .status-badge {
                font-size: 0.95rem;
            }

            input[type="number"] {
                width: 55px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="section">
            <div class="courses-container" id="coursesContainer"></div>
            <button class="add-course-btn" id="addCourseBtn" onclick="addCourse()">➕ Agregar Materia</button>
        </div>

        <div class="section parameters-box">
            <div style="color: #f8fafc; font-weight: bold; font-size: 1.05rem; margin-bottom: 10px;">
                Información adicional
            </div>
            <div class="parameter-group" id="probationGroup">
                <label class="parameter-label" for="probationPeriods">Períodos de prueba:</label>
                <input type="number" id="probationPeriods" min="0" max="10" step="1" value="0" oninput="calculate()">
            </div>
            <div class="parameter-group" id="lastSemesterGroup">
                <label class="parameter-label" for="lastSemesterAvg">Promedio anterior:</label>
                <input type="number" id="lastSemesterAvg" min="0" max="5" step="0.1" placeholder="-" oninput="calculate()">
            </div>
        </div>

        <div class="results">
            <div class="result-item">
                <span class="result-label">Total de Créditos:</span>
                <span class="result-value" id="totalCredits">0.0</span>
            </div>
            <div class="result-item">
                <span class="result-label">Promedio Actual:</span>
                <span class="result-value" id="currentAvg">0.00</span>
            </div>
            <div class="result-item" id="twoSemAvgRow">
                <span class="result-label">Prom. 2 Semestres:</span>
                <span class="result-value" id="twoSemAvg">0.00</span>
            </div>
            <div class="result-item" style="border: none; padding-top: 6px;">
                <span class="result-label">Estado:</span>
                <span class="status-badge status-normal" id="academicStatus">NORMAL</span>
            </div>
        </div>
    </div>

    <script>
        function init() {
            for (let i = 0; i < 3; i++) addCourse();
            calculate();
        }

        function updateCourseLabels() {
            const labels = document.querySelectorAll('.course-label');
            labels.forEach((label, index) => {
                label.textContent = `Curso ${index + 1}`;
            });
            const addBtn = document.getElementById('addCourseBtn');
            if (labels.length >= 8) {
                addBtn.disabled = true;
                addBtn.textContent = 'Límite de 8 materias alcanzado';
            } else {
                addBtn.disabled = false;
                addBtn.textContent = '➕ Agregar Materia';
            }
        }

        function addCourse() {
            const container = document.getElementById('coursesContainer');
            if (document.querySelectorAll('.course-row').length >= 8) return;
            const courseRow = document.createElement('div');
            courseRow.className = 'course-row';
            courseRow.innerHTML = `
                <div class="course-label"></div>
                <input type="number" placeholder="Créditos" class="course-credits" min="1" max="10" step="1" oninput="calculate()">
                <input type="number" placeholder="Nota" class="course-grade" min="0" max="5" step="0.1" oninput="calculate()">
                <button class="remove-btn" onclick="removeCourse(this)">✕</button>
            `;
            container.appendChild(courseRow);
            updateCourseLabels();
        }

        function removeCourse(button) {
            button.parentElement.remove();
            updateCourseLabels();
            calculate();
        }

        function calculate() {
            const courses = document.querySelectorAll('.course-row');
            let totalCredits = 0, weightedSum = 0;
            courses.forEach(course => {
                const credits = parseFloat(course.querySelector('.course-credits').value) || 0;
                const grade = parseFloat(course.querySelector('.course-grade').value) || 0;
                if (credits > 0 && grade >= 0) {
                    totalCredits += credits;
                    weightedSum += credits * grade;
                }
            });

            const currentAvg = totalCredits > 0 ? weightedSum / totalCredits : 0;
            const lastSemAvgInput = document.getElementById('lastSemesterAvg').value;
            const isFirstSem = (lastSemAvgInput === "") ? "SI" : "NO";

            const twoSemAvgRow = document.getElementById('twoSemAvgRow');
            twoSemAvgRow.style.display = isFirstSem === "SI" ? 'none' : 'flex';

            const lastSemAvg = parseFloat(lastSemAvgInput) || 0;
            const twoSemAvg = (lastSemAvg + currentAvg) / 2;
            const probationPeriods = parseInt(document.getElementById('probationPeriods').value) || 0;

            let status = "", statusClass = "";

            if (probationPeriods < 2) {
                if (isFirstSem === "NO") {
                    if (currentAvg < 3) {
                        if (twoSemAvg < 2.5) {
                            status = "INSUFICIENTE"; statusClass = "status-insuficiente";
                        } else if (twoSemAvg < 3) {
                            status = "PERIODO DE PRUEBA"; statusClass = "status-prueba";
                        } else {
                            status = "NORMAL"; statusClass = "status-normal";
                        }
                    } else {
                        status = "NORMAL"; statusClass = "status-normal";
                    }
                } else {
                    if (currentAvg < 2.5) {
                        status = "INSUFICIENTE"; statusClass = "status-insuficiente";
                    } else if (currentAvg < 2.8) {
                        status = "PERIODO DE PRUEBA"; statusClass = "status-prueba";
                    } else {
                        status = "NORMAL"; statusClass = "status-normal";
                    }
                }
            } else {
                if ((lastSemAvg + currentAvg) / 2 < 3) {
                    status = "INSUFICIENTE"; statusClass = "status-insuficiente";
                } else {
                    status = "NORMAL"; statusClass = "status-normal";
                }
            }

            document.getElementById('totalCredits').textContent = totalCredits.toFixed(1);
            document.getElementById('currentAvg').textContent = currentAvg.toFixed(2);
            document.getElementById('twoSemAvg').textContent = twoSemAvg.toFixed(2);
            const statusBadge = document.getElementById('academicStatus');
            statusBadge.textContent = status;
            statusBadge.className = 'status-badge ' + statusClass;
        }

        window.onload = init;
    </script>
</body>
</html>
