<script>
const edges = [{"from": "0303001", "to": "0303002", "tipo": "PRE"}, {"from": "0314028", "to": "0314029", "tipo": "PRE"}, {"from": "0303001", "to": "0303010", "tipo": "PRE"}, {"from": "0303006", "to": "0314067", "tipo": "PRE"}, {"from": "0303002", "to": "0303005", "tipo": "PRE"}, {"from": "0314029", "to": "0314047", "tipo": "PRE"}, {"from": "0314067", "to": "0314068", "tipo": "PRE"}, {"from": "0305190", "to": "0305450", "tipo": "PRE"}, {"from": "0305190", "to": "0305002", "tipo": "PRE"}, {"from": "9003101", "to": "9003102", "tipo": "PRE"}, {"from": "0303005", "to": "0303009", "tipo": "PRE"}, {"from": "0303010", "to": "0303013", "tipo": "PRE"}, {"from": "0303005", "to": "0303013", "tipo": "PRE"}, {"from": "0303010", "to": "0303313", "tipo": "PRE"}, {"from": "0303005", "to": "0314069", "tipo": "PRE"}, {"from": "0314029", "to": "0314069", "tipo": "PRE"}, {"from": "0305002", "to": "0305003", "tipo": "PRE"}, {"from": "0305450", "to": "0305003", "tipo": "PRE"}, {"from": "9003102", "to": "9003103", "tipo": "PRE"}, {"from": "0303313", "to": "0314306", "tipo": "PRE"}, {"from": "0303313", "to": "0314070", "tipo": "PRE"}, {"from": "0314068", "to": "0314210", "tipo": "PRE"}, {"from": "0305003", "to": "0305004", "tipo": "PRE"}, {"from": "9003103", "to": "9003104", "tipo": "PRE"}, {"from": "0314069", "to": "0314302", "tipo": "PRE"}, {"from": "0303013", "to": "0314302", "tipo": "PRE"}, {"from": "0314306", "to": "0314405", "tipo": "PRE"}, {"from": "0314070", "to": "0314405", "tipo": "PRE"}, {"from": "0314070", "to": "0314313", "tipo": "PRE"}, {"from": "0314070", "to": "0314030", "tipo": "PRE"}, {"from": "0305004", "to": "0305005", "tipo": "PRE"}, {"from": "9003104", "to": "9003105", "tipo": "PRE"}, {"from": "0314405", "to": "0314415", "tipo": "PRE"}, {"from": "0314302", "to": "0314415", "tipo": "PRE"}, {"from": "0314313", "to": "0314415", "tipo": "PRE"}, {"from": "0314302", "to": "0314062", "tipo": "PRE"}, {"from": "0314313", "to": "0314311", "tipo": "PRE"}, {"from": "0303029", "to": "0314044", "tipo": "PRE"}, {"from": "0314030", "to": "0314404", "tipo": "PRE"}, {"from": "0314030", "to": "0314416", "tipo": "PRE"}, {"from": "0314044", "to": "0314045", "tipo": "PRE"}, {"from": "0314070", "to": "0314210", "tipo": "CO"}];

// Build adjacency lists
const preOf = {};   // preOf[code] = [codes that are prerequisites OF this code]
const depOn = {};   // depOn[code] = [codes that DEPEND ON this code]
edges.forEach(e => {
  if (!preOf[e.to]) preOf[e.to] = [];
  preOf[e.to].push(e.from);
  if (!depOn[e.from]) depOn[e.from] = [];
  depOn[e.from].push(e.to);
});

function getChain(code) {
  // Get full chain: all ancestors (prerequisites) and all descendants (dependents)
  const chain = new Set();
  chain.add(code);
  // Traverse up (prerequisites)
  const upQueue = [code];
  while (upQueue.length) {
    const c = upQueue.shift();
    (preOf[c] || []).forEach(p => { if (!chain.has(p)) { chain.add(p); upQueue.push(p); } });
  }
  // Traverse down (dependents)
  const downQueue = [code];
  while (downQueue.length) {
    const c = downQueue.shift();
    (depOn[c] || []).forEach(d => { if (!chain.has(d)) { chain.add(d); downQueue.push(d); } });
  }
  return chain;
}

function getChainEdges(chain) {
  return edges.filter(e => chain.has(e.from) && chain.has(e.to));
}

let mode = 'clear'; // 'clear', 'all', 'chain'
let selectedCode = null;

function clearAll() {
  mode = 'clear'; selectedCode = null;
  document.querySelectorAll('.arrow').forEach(a => a.style.display = 'none');
  document.querySelectorAll('.course-box').forEach(b => {
    b.classList.remove('dimmed','highlighted','selected');
  });
  updateButtons();
}

function showAll() {
  mode = 'all'; selectedCode = null;
  document.querySelectorAll('.arrow').forEach(a => a.style.display = '');
  document.querySelectorAll('.course-box').forEach(b => {
    b.classList.remove('dimmed','highlighted','selected');
  });
  updateButtons();
}

function showChain(code) {
  mode = 'chain'; selectedCode = code;
  const chain = getChain(code);
  const chainEdges = getChainEdges(chain);

  // Hide all arrows, then show only chain arrows
  document.querySelectorAll('.arrow').forEach(a => {
    const from = a.getAttribute('data-from');
    const to = a.getAttribute('data-to');
    const inChain = chainEdges.some(e => e.from === from && e.to === to);
    a.style.display = inChain ? '' : 'none';
  });

  // Dim non-chain boxes, highlight chain boxes
  document.querySelectorAll('.course-box').forEach(b => {
    const bCode = b.getAttribute('data-code');
    if (!bCode) { b.classList.add('dimmed'); b.classList.remove('highlighted','selected'); return; }
    if (bCode === code) {
      b.classList.add('selected'); b.classList.remove('dimmed','highlighted');
    } else if (chain.has(bCode)) {
      b.classList.add('highlighted'); b.classList.remove('dimmed','selected');
    } else {
      b.classList.add('dimmed'); b.classList.remove('highlighted','selected');
    }
  });
  updateButtons();
}

function updateButtons() {
  document.getElementById('btn-clear').classList.toggle('active', mode === 'clear');
  document.getElementById('btn-all').classList.toggle('active', mode === 'all');
}

// Click handlers on course boxes
document.querySelectorAll('.course-box[data-code]').forEach(box => {
  box.addEventListener('click', () => {
    const code = box.getAttribute('data-code');
    if (selectedCode === code) { clearAll(); }
    else { showChain(code); }
  });
});
</script>
