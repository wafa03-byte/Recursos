  body { margin: 20px; background: #FAFAFA; font-family: Calibri, 'Segoe UI', sans-serif; }
  h1 { text-align: center; font-size: 14px; color: #333; margin-bottom: 5px; }
  .controls { text-align: center; margin: 8px 0; }
  .controls button {
    padding: 6px 18px; margin: 0 6px; border: 1px solid #999; border-radius: 4px;
    background: white; font-size: 14px; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .controls button:hover { background: #E8E8E8; }
  .controls button.active { background: #333; color: white; border-color: #333; }
  #info-box {
    text-align: center; min-height: 22px; margin: 6px auto 10px;
    font-size: 14px; color: #333; padding: 0 20px;
  }
  #info-box .code { font-weight: bold; }
  #info-box .req { color: #B45309; }
  svg { display: block; margin: 0 auto; }
  .course-box { transition: opacity 0.2s; }
  .course-box.dimmed { opacity: 0.25; }
  .course-box.highlighted rect.box-code-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.highlighted rect.box-name-bg { stroke: #F59E0B; stroke-width: 2.5; }
  .course-box.selected rect.box-code-bg { stroke: #DC2626; stroke-width: 3; }
  .course-box.selected rect.box-name-bg { stroke: #DC2626; stroke-width: 3; }
  .arrow { transition: opacity 0.3s; }
  @media print {
    body { margin: 0; background: white; }
    .controls, #info-box { display: none; }
  }

  /* ── saberes-panel ─────────────────────────────────────────── */
  #saberes-panel {
    position: fixed; bottom: 20px; right: 20px;
    width: 400px; max-height: 55vh;
    background: white; border: 1px solid #ccc;
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    display: none; flex-direction: column;
    font-family: sans-serif; font-size: 14px; z-index: 9999;
  }
  #saberes-panel.visible { display: flex; }
  #saberes-header {
    background: #1e3a5f; color: white;
    padding: 10px 14px; font-size: 15px; font-weight: bold;
    border-radius: 6px 6px 0 0; cursor: grab;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none; flex-shrink: 0;
  }
  #saberes-header:active { cursor: grabbing; }
  #saberes-close {
    background: none; border: none; color: white;
    font-size: 20px; line-height: 1; cursor: pointer;
    padding: 0 2px; opacity: 0.8;
  }
  #saberes-close:hover { opacity: 1; }
  #saberes-body {
    padding: 12px 14px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.5; flex: 1;
  }
  #saberes-body.no-data { color: #888; font-style: italic; }
  @media print { #saberes-panel { display: none !important; } }

</style>

0303015", "tipo": "PRE"}, {"from": "0305003", "to": "0305004", "tipo": "PRE"}, {"from": "9003104", "to": "9003105", "tipo": "PRE"}, {"from": "0303015", "to": "0303029", "tipo": "PRE"}, {"from": "0303302", "to": "0303352", "tipo": "PRE"}, {"from": "0303302", "to": "0303402", "tipo": "PRE"}, {"from": "0305004", "to": "0305005", "tipo": "PRE"}, {"from": "0303029", "to": "0314044", "tipo": "PRE"}, {"from": "0303352", "to": "0303459", "tipo": "PRE"}, {"from": "0303302", "to": "0303452", "tipo": "PRE"}, {"from": "0302391", "to": "0303527", "tipo": "PRE"}, {"from": "0303013", "to": "0303527", "tipo": "PRE"}, {"from": "0303352", "to": "0303527", "tipo": "PRE"}, {"from": "0314044", "to": "0314045", "tipo": "PRE"}, {"from": "0303412", "to": "0303552", "tipo": "PRE"}, {"from": "0303452", "to": "0303552", "tipo": "PRE"}];
const preOf = {};
const depOn = {};
edges.forEach(e => {
  if (!preOf[e.to]) preOf[e.to] = [];
  preOf[e.to].push(e.from);
  if (!depOn[e.from]) depOn[e.from] = [];
  depOn[e.from].push(e.to);
});
function getChain(code) {
  const chain = new Set([code]);
  const q1 = [code];
  while (q1.length) {
    const c = q1.shift();
    (preOf[c] || []).forEach(p => { if (!chain.has(p)) { chain.add(p); q1.push(p); } });
  }
  const q2 = [code];
  while (q2.length) {
    const c = q2.shift();
    (depOn[c] || []).forEach(d => { if (!chain.has(d)) { chain.add(d); q2.push(d); } });
  }
  return chain;
}
function updateInfoBox(code) {
  const infoDiv = document.getElementById('info-box');
  if (!code) { infoDiv.innerHTML = ''; return; }
  const box = document.querySelector('.course-box[data-code="' + code + '"]');
  if (!box) { infoDiv.innerHTML = ''; return; }
  const name = box.getAttribute('data-name') || '';
  const cred = box.getAttribute('data-cred') || '0';
  const credExig = parseInt(box.getAttribute('data-cred-exigidos') || '0', 10);
  let html = '<span class="code">' + code + '</span> · ' + name + ' · ' + cred + ' créditos';
  if (credExig > 0) {
    html += ' · <span class="req">requiere ' + credExig + ' créditos previos aprobados</span>';
  }
  infoDiv.innerHTML = html;
}
let mode = 'clear', selectedCode = null;
function clearAll() {
  mode = 'clear'; selectedCode = null;
  document.querySelectorAll('.arrow').forEach(a => a.style.display = 'none');
  document.querySelectorAll('.course-box').forEach(b => b.classList.remove('dimmed','highlighted','selected'));
  updateInfoBox(null);
  updateButtons();
}
function showAll() {
  mode = 'all'; selectedCode = null;
  document.querySelectorAll('.arrow').forEach(a => a.style.display = '');
  document.querySelectorAll('.course-box').forEach(b => b.classList.remove('dimmed','highlighted','selected'));
  updateInfoBox(null);
  updateButtons();
}
function showChain(code) {
  mode = 'chain'; selectedCode = code;
  const chain = getChain(code);
  const chainEdges = edges.filter(e => chain.has(e.from) && chain.has(e.to));
  document.querySelectorAll('.arrow').forEach(a => {
    const f = a.getAttribute('data-from'), t = a.getAttribute('data-to');
    a.style.display = chainEdges.some(e => e.from === f && e.to === t) ? '' : 'none';
  });
  document.querySelectorAll('.course-box').forEach(b => {
    const bc = b.getAttribute('data-code');
    if (!bc) { b.classList.add('dimmed'); b.classList.remove('highlighted','selected'); return; }
    if (bc === code) { b.classList.add('selected'); b.classList.remove('dimmed','highlighted'); }
    else if (chain.has(bc)) { b.classList.add('highlighted'); b.classList.remove('dimmed','selected'); }
    else { b.classList.add('dimmed'); b.classList.remove('highlighted','selected'); }
  });
  updateInfoBox(code);
  updateButtons();
}
function updateButtons() {
  document.getElementById('btn-clear').classList.toggle('active', mode === 'clear');
  document.getElementById('btn-all').classList.toggle('active', mode === 'all');
}
document.querySelectorAll('.course-box[data-code]').forEach(box => {
  box.addEventListener('click', () => {
    const code = box.getAttribute('data-code');
    if (selectedCode === code) clearAll(); else showChain(code);
  });
});

\nEstructuras condicionales múltiples, anidadas\nEstructuras de iteración definida e indefinida\n\nUnidad 3: Funciones \nTemas\nFunciones incorporadas\nMódulos, submódulos.\nDefinición de funciones, ámbito de las variables, problemas de aplicación\n\nUnidad 4: Bases de datos con SQL y visualización de datos \nTemas\nFundamentos de SQL, creación y particionamiento, filtros, funciones, subconsultas, unions, joins.", "303005": "Unidad 1: Nombre: Antiderivada y Técnicas de Integración.\nTemas\nFunción Primitiva o Antiderivada. La integral indefinida definición y notación.\nFórmulas de la integración. Propiedades de la integral indefinida. \nMétodos de integración: Regla de sustitución (cambio de variables), Integración por partes. Integración de potencias de funciones trigonométricas, Sustituciones trigonométricas, descomposición en fracciones parciales, Sustituciones para racionalizar.\n\nUnidad 2: Nombre: Integral Definida\nTemas\nLa integral definida. La notación sumatoria (notación sigma).\nSumas de Riemann. Definición de la integral definida según Riemann. Teorema: continuidad implica integrabilidad. Análisis del recíproco.\nPropiedades de la integral definida y sus generalizaciones. Propiedades que ayudan a simplificar la integral. Funciones pares e impares.\nLos teoremas fundamentales del cálculo. Teorema del valor medio para integrales.\nIntegrales impropias\n\nUnidad 3: Nombre: Aplicaciones de la Integral\nTemas\nÁreas entre curvas.\nVolúmenes de sólidos: Método de secciones planas. Volúmenes de sólidos de revolución: método de los discos, método de las arandelas, método de la corteza cilíndrica. Longitud de arco de una curva plana y área de superficie de revolución.\nMomentos y centros de masa de una barra, centroide de una región plana. Los teoremas de Pappus\n\nUnidad 4: Nombre: Sucesiones y Series\nTemas\nSucesiones y series. Sucesiones, definición y límite de una sucesión, clasificación y teoremas sobre límites de sucesiones.\nSeries numéricas.  Propiedades. Serie geométrica. Serie telescópica. Criterios de convergencia y divergencia de series. Criterio del término n-ésimo para divergencia. Criterio de la integral. Criterios de comparación. Comparación en el límite. Criterio del cociente y de la raíz, criterio de Raabe.\nSeries alternantes, convergencia absoluta y condicional. Criterio del cociente y de la raíz para convergencia absoluta.\nSeries de potencia. Representación de funciones por series de potencias. Formula de Euler. Cálculo con series de potencias. La serie binomial.", "303011": "Unidad 1:  Relaciones de orden, relaciones de equivalencia y particiones.\nTemas\nÓrdenes parciales y órdenes parciales estrictos.\nElementos distinguidos: mínimos, máximos, minimales, maximales, cotas inferiores, cotas superiores, ínfimos y supremos.\nCadenas y conjuntos totalmente ordenados.\nConjuntos bien ordenados.\nFunciones crecientes e isomorfismos entre órdenes.\n\nUnidad 2: Formalización de conjuntos numéricos dentro de ZF.\nTemas\nFormalización de los naturales,\nFormalización de los enteros.\nFormalización de los racionales.\nFormalización de los reales.\nFormalización de los complejos.\n\nUnidad 3: Equipotencia y cardinalidad.\nTemas\nRelación de equipotencia.\nCardinalidad finita.\nCardinales infinitos y algunas operaciones entre ellos.\nRelación de dominancia.\n\nUnidad 4: Axioma de elección.\nTemas\nDiversos enunciados del axioma de elección y sus equivalencias.\nPrincipios maximales de Hausdorff y Lema de Zorn.\nPrincipio del buen orden.\nAlgunos usos del axioma de elección.", "303258": "Unidad 1: Los números enteros\n\nPrincipio del buen orden.\nDivisibilidad en los enteros.\nRepresentación de enteros.\nAlgoritmo de la división.\nNúmeros primos.\n\nUnidad 2:  y Máximo común divisor y  el Teorema fundamental de la Aritmética\n\nMáximo común Divisor (MCD).\nMínimo Común múltiplo(MCM).\nAlgoritmo de Euclides.\nTeorema fundamental de la aritmética.\nFactorización de Enteros. \n\nUnidad 3: Ecuaciones diofánticas y Congruencias lineales\n\nEcuaciones Diofánticas lineales y aplicaciones.\nTeoría de la congruencia.\nTeorema chino del Residuo.\nTeorema de Fermat y el teorema de Wilson.\nAplicaciones de las congruencias. \n\nUnidad 4: Introducción a la combinatoria y Funciones Aritméticas\n\nPrincipios combinatoriales aditivo y multiplicativo.\nNúmeros binomiales: interpretación combinatorial y algebraica.\nLas funciones  tau y sigma.\nLa phi de Euler y la función de Möbius\nFunción aritméticas.\n\nUnidad 5:Raices primitivas \n\nOrden de un entero módulo n\nRaíces primitivas para primos\nReciprocidad cuadrática", "303009": "Unidad 1: Ecuaciones paramétricas y coordenadas polares, cilíndricas y esféricas\nTemas:\nParametrización de curvas planas, sistema de coordinadas polares, cilíndricas y esféricas\nCálculo con curvas paramétricas, longitud de curva, curvatura y sus aplicaciones.\nTrazado de curvas y superficies en el espacio y curvas de nivel.\n\nUnidad 2: Nombre: Límites, Diferenciabilidad y aplicaciones\nTemas:\nLímites y continuidad\nDerivadas parciales\nRegla de la cadena\nDerivadas Direccionales y vector gradiente\nPlanos tangentes y diferenciales\nValores extremos y puntos de silla\nMultiplicadores de Lagrange\n\nUnidad 3: Nombre: Integrales múltiples\nTemas:\nIntegrales dobles e iteradas sobre rectángulos\nIntegrales dobles sobre regiones generales\nIntegrales dobles y áreas\nIntegrales dobles en coordinadas polares\nIntegrales triples en coordenadas rectangulares, cilíndricas y esféricas\nMomentos y centros de masa\nTeorema del cambio de variable\n\nUnidad 4: Nombre: Campos vectoriales e integración sobre campos vectoriales\nTemas:\nIntegrales de línea\nCampos vectoriales e integrales de línea:  Independencia de la trayectoria, campos conservativos y funciones potenciales\nTeorema de Green\nIntegrales de superficie\nTeorema de Stokes\nTeorema de la Divergencia", "303313": "Unidad 1: Función de probabilidad\nTemas\nEspacio muestral, eventos\nAxiomas de la función de probabilidad\nProbabilidad clásica y probabilidad frecuentista\nTécnicas básicas de conteo\nTeorema de Bayes\nIndependencia de eventos    \n\nUnidad 2:  Variable aleatoria\nTemas\nDefinición y tipos de variables aleatorias\nFunción de distribución acumulada\nFunción de densidad de probabilidad\nValores esperados\nDesigualdades importantes\n  \nUnidad 3:   Distribuciones de probabilidad especiales\nTemas\nDistribuciones discretas: Bernoulli, Binomial, Poisson, Geométrica, Hipergeométrica, Binomial negativa, Uniforme\nDistribuciones continuas:  Uniforme, Exponencial, Gamma, Chi-cuadrada, Normal\n\nUnidad 4:   Distribuciones de varias variables   \nTemas\nDistribuciones conjuntas discretas y continuas\nDistribución marginal y condicional\nEsperanzas condicionales\nIndependencia entre variables \n\nUnidad 5:   Distribución de funciones de variables aleatoria   \nTemas\nTécnica de la función de distribución acumulada\nTécnica de la transformación para variables continuas\nTécnica de la función generadora de momentos\nEstadísticos de orden.", "303304": "Unidad 1: Grupos y homomorfismos de grupos\nOperaciones binarias y grupos.\nGrupos abelianos y no abelianos.\nSubgrupos.\nGrupos cíclicos, propiedades y teoremas.\nHomomorfismos de grupos.\n\nUnidad 2: Clases lateras y grupo cociente\nClases laterales, teorema de Lagrange.\nSubgrupos normales.\nGrupos cociente y teorema de Cauchy para grupos abelianos.\nTeoremas de homomorfismos.\nÓrbitas y teorema de Cauchy para grupos no abelianos.\n\nUnidad 3: Producto directo y teorema fundamental de los grupos abelianos \nProducto directo interno (P.D.I.)\nProducto directo externo (P.D.E.)\nTeorema fundamental de los grupos abelianos finitos.\nGrupo simétrico, propiedades y teoremas.\n\nUnidad 4: Teoremas de Cayley y Sylow\nGrupo Diedral, teorema de Cayley y acciones de grupos.\nÓrbitas, estabilizadores, clases de conjugación.\nTeoremas de Sylow.\nP-Grupos de Sylow.", "314069": "1. Métodos iterativos de resolución de ecuaciones no lineales (punto fijo,\nbisección, método de regula-falsi, secante, método de Newton-\nRaphson)\n2. Métodos directos e iterativos de resolución de sistemas de ecuaciones\nlineales.\n3. Interpolación\n4. Integración numérica\n5. Diferenciación numérica\n6. Resolución de ecuaciones diferenciales ordinarias\n7. Matrices estocásticas y cadenas de Markov", "303013": "Unidad 1: Ecuaciones diferenciales de primer orden \nTemas\nDefinición de ecuación diferencial y orden de una ecuación diferencial. Clasificación de las ecuaciones diferenciales: \ttipo, orden y linealidad.\nDefinición de solución, definición de solución general y solución particular, problema de valor inicial.\nTeorema de Existencia y unicidad.\nEcuaciones diferenciales de primer orden: Ecuaciones lineales, Ecuaciones separables, Ecuaciones homogéneas, Ecuaciones exactas, teoremas sobre exactas y factores integrantes, Ecuación de Bernoulli. Sustituciones varias. \n\nIdentificar las diferentes ecuaciones diferenciales con los diferentes métodos para resolverlas. \n\nUnidad 2: Aplicaciones de las Ecuaciones diferenciales de primer orden \nTemas\nAplicaciones geométricas (trayectorias isogonales y ortogonales, problemas de persecución y problemas de geometría analítica).\nProblemas de crecimiento y decrecimiento exponencial.\nProblemas de mezclas químicas. Problemas de vaciado de tanques.\nCircuitos. Problemas de aplicación a la física.\nConstruir la ecuación diferencial que modele cada problema planteado y resolverla por los métodos de la unidad anterior.\n\nUnidad 3: Teoría de las Ecuaciones lineales de primer orden\nTemas\nConceptos básicos, espacio C(I), C'(I), C''(I), etc., funciones linealmente dependientes e independientes, Wronskiano y teoremas sobre la dimensión del espacio solución de una Ecuaciones diferenciales  homogénea, Método de reducción de orden.\nSoluciones fundamentales de las ecuaciones lineales homogéneas. \nEcuaciones homogéneas con coeficientes constantes. Ecuación característica.\nEcuación no homogénea: Método de los coeficientes indeterminados.  Método de variación de parámetros. \nMétodo de los operadores inversos.\nAplicaciones de las ecuaciones diferenciales de segundo orden: Vibraciones mecánicas y eléctricas, vibraciones forzadas. \n\nIdentificar las ecuaciones homogéneas y los diferentes métodos para resolverlas. \nResolver la ecuación característica con el objetivo de hallar un conjunto de soluciones. \nAplicar el método de los coeficientes indeterminados, variación de parámetros y operadores inversos. \nIlustrar la utilidad de estos métodos para resolver problemas del área de física e ingeniería.\n\nUnidad 4: Solución por Series\nTemas\nRefrescar el concepto de serie y las propiedades de las series. \nDefinición de punto ordinario y solución de una ecuación diferencial alrededor de un punto ordinario. \nDefinición de punto singular y solución alrededor de un punto singular, teorema de Frobenius, ecuación de índices y los tres casos que surgen con las raíces indiciales. \nFunción gamma y teoremas relativos.\nEcuación diferencial de Bessell y propiedades de la función de Bessell\n\nUsar los métodos de series para resolver Ecuaciones Diferenciales con coeficientes variables.\n\nUnidad 5: Transformada de Laplace \nTemas\nDefinición de Trasformada de Laplace y trasformada inversa de Laplace y la tabla de las principales fórmulas de trasformada y trasformada inversa de Laplace, ejemplos.\nTeoremas de trasformada de Laplace: teorema de existencia de la trasformada de Laplace, primer teorema de traslación, segundo teorema de traslación, teorema de la derivada de una trasformada, teorema de la trasformada de una derivada, teorema del producto convolutivo y trasformada de la integral, teorema de la generalización de la trasformada de una potencia con exponente real, teorema de la trasformada de una función periódica.\nAplicaciones de la trasformada a Ecuaciones diferenciales lineales de coeficientes constantes o variables y a ecuaciones Integrales y ecuaciones integro-diferenciales.\nFunción Impulso Unitario o Delta de Dirac, sus propiedades y su trasformada de Laplace, aplicación a Ecuaciones diferenciales que contengan la función Delta-Dirac \n\nUtilizar la Trasformada de Laplace como método alternativo para resolver Ecuaciones Diferenciales con condiciones iniciales, ecuaciones integrales o integrodiferenciales", "314070": "Unidad 1:   Distribuciones límite y distribuciones muestrales\nTemas\n Sucesiones de variables aleatorias \nTeorema del límite central\nAproximaciones para la distribución binomial\nDistribuciones asintóticas\nPropiedades de convergencia estocástica\nTeoremas límite adicionales \nDistribuciones muestrales \nDistribuciones t, F y beta, aproximaciones para grandes muestras.\n\nUnidad 2:  Teoría de los estimadores\nTemas\nAlgunos métodos de estimación\nCriterios para la evaluación de estimadores, \nPropiedades asintóticas\nEstadísticos suficientes y sus propiedades\nCompletez\nFamilia exponencial de distribuciones.\n  \nUnidad 3:   Intervalos de confianza y pruebas de hipótesis\nTemas\nDefinición de intervalo de confianza\nMétodo de la cantidad pivotal\nMétodo general \nProcedimientos sobre dos poblaciones\nConceptos básicos sobre pruebas de hipótesis\n Procedimientos con hipótesis compuestas\nPruebas para los parámetros de la distribución normal\nPruebas más potentes\nPruebas uniformemente más potentes \nPruebas basadas en la verosimilitud.\n        \nUnidad 6:  Pruebas de Hipótesis\nTemas\n   Introducción, la idea de una prueba de hipótesis.\n   Términos básicos: hipótesis nula, hipótesis alternativa.\n   Clases de hipótesis.\n   Procedimiento para realizar una prueba de hipótesis (definir: estadístico de prueba o contraste, valor-p,   \n   nivel de significancia).\n   Prueba de hipótesis para la media con varianza conocida.", "303354": "Unidad 1: Anillos y sus propiedades:\nTemas:\nDefinición, ejemplos y propiedades de los anillos.\nSubanillos y dominios de integridad (D.I.).\nIdeales y anillos cocientes.\nIdeales primos e ideales maximales.\nHomomorfismos de anillos y teoremas de homomorfismos.\nPropiedades de los D.I., mcd, mcm, primos e irreducibles.\nCampo de fracciones de un D.I. y polinomios sobre un D.I.\n\nUnidad 2: Algunos D.I. particulares:\nTemas:\nDominios de ideales principales (D.I.P.)\nDominios Euclídeos (D.E.)\nPolinomios sobre un D.I.P. y sobre un D.E.\nDominios de factorización única (D.F.U.) \nPolinomios sobre un D.F.U.\nCriterios de irreducibilidad.\nUnidad 3: Campos y extensiones de campos:\nTemas:\nExtensiones de campos y campos de descomposición.\nTeoremas para polinomios irreducibles.\nRaíces múltiples y polinomios derivados.\nCampos perfectos.\nExtensiones algebraicas, trascendentes, simples y finitas.\nTeorema del elemento primitivo.\nCampos finitos y subcampos.", "303252": "Unidad 1: Números Reales\nTemas\nAxiomas de Campo, orden y completitud.\nConsecuencias de los axiomas de campo y de los axiomas de orden.\nConsecuencias del Axioma de Completitud.\nConjuntos de enteros, racionales e irracionales.\nPrincipio de Arquímedes.\n\nUnidad 2:  Topología en R\nTemas\nIntervalos y vecindades.\nConjuntos cerrados y abiertos de números reales.\nInterior, exterior y frontera de un conjunto de números reales. Conjuntos acotados.\nCaracterización de conjuntos abiertos por intervalos y sucesiones de conjuntos.\nCubrimiento de conjuntos de números reales. Lema de subcubrimiento finito o principio de Heine-Borel.\nConjuntos compactos, Teorema de Bolzano-Weierstrass y puntos de acumulación.\nTopología en R*.\n\nUnidad 3:  Sucesiones\nTemas\nConvergencia de sucesiones.\nOperaciones aritméticas y desigualdades en el paso al límite de sucesiones.\nCriterio de Cauchy. Sucesiones monótonas.\nSubsucesiones.\nLímite inferior y límite superior de una sucesión.\nConvergencia en R*.\n\nUnidad 4:  Series Numéricas\nTemas\nDefinición. Convergencia de series.\nCriterios de convergencia de series de términos no negativos.\nSeries alternantes. Series de términos de signo arbitrario. Convergencia absoluta y condicional.\nReordenamiento y producto de series\n\nUnidad 5:  Límites y Continuidad de Funciones\nTemas\nLímite de funciones. Propiedades generales del límite de funciones.\nOperaciones aritméticas y desigualdades en el paso al límite de funciones.\nContinuidad. Definiciones y ejemplos.\nPuntos de discontinuidad. Tipos de discontinuidad\nPropiedades locales de las funciones continuas.\nPropiedades globales de las funciones continuas.\nTeorema del valor intermedio. Teorema del valor extremo.\nFunciones uniformemente continuas. Funciones monótonas.\n\nUnidad 6:  Diferenciación\nTemas\nDefiniciones y ejemplos.\nReglas de diferenciación. Derivadas de orden superior.\nPrincipales teoremas del Cálculo Diferencial.\nTeorema del Valor Medio.\nFórmula de Taylor.", "303404": "Unidad 1: Álgebra Lineal\nTemas\nEspacios vectoriales y transformaciones lineales.\nSuma directa de espacios vectoriales.\nCociente de espacios vectoriales.\nTeorema del rango y la nulidad.\nFuncionales lineales y dualidad.\nTransformación adjunta.\nEntendimiento del concepto de suma directa de espacios vectoriales.\nInterpretación del cociente entre espacios vectoriales y el cálculo de su dimensión.\nUso del teorema del rango y la nulidad para determinar información sobre el espacio de soluciones de un sistema de ecuaciones lineales.\nEntendimiento de la definición de espacio dual y la funtorialidad.\n\nUnidad 2: Funciones Multilineal\nTemas\nFunciones y formas bilineales.\nFunciones y formas multilineales.\nFunciones y formas multilineales simétricas y antisimétricas.\nDeterminantes.\nEl grupo ortogonal.\nDeterminación de una función como multilineal y clasificación de aquellas que son simétricas y antisimétricas.\nEntendimiento del determinante como única forma multilineal alternante unitaria y caracterización de las formas multilineales alternadas.\nEntendimiento del grupo ortogonal como aquel que preserva la forma bilineal asociada al producto interno usual.\n\nUnidad 3: Producto tensorial\nTemas\nPropiedad universal.\nProducto tensorial de funcionales lineales.\nPropiedad universal del producto tensorial de espacios vectoriales.\nExistencia y unicidad del producto tensorial.\nRelación del producto tensorial con cocientes, sumas directas y transformaciones lineales.\nDimensión del producto tensorial.\nEntendimiento de la propiedad universal que define al producto tensorial.\nConstrucción del producto tensorial.\nCálculo de la dimensión del producto tensorial.\n\nUnidad 4: Álgebra Exterior y Álgebra Simétrica\nTEMAS\nProducto exterior.\nÁlgebra exterior.\nProducto simétrico.\nÁlgebra simétrica.\nFormas diferenciales.\nReconocimiento de la propiedad universal del producto exterior.\nDefinición del álgebra exterior.\nRelación entre álgebra exterior y dualidad.\nRelación entre álgebra exterior y transformaciones\nlineales.\nReconocimiento de la propiedad universal del producto simétrico.\nDefinición del álgebra simétrica.\nRelación entre álgebra simétrica y dualidad.\nRelación entre álgebra simétrica y transformaciones lineales.\nAplicación del álgebra exterior en el estudio de formas diferenciales.", "303412": "Unidad 1: Nombre: Espacios Topológicos y funciones continuas\nTemas\nEspacios Topológicos.\nBase de una topología.\nLa topología del orden.\nLa topología producto sobre el espacio XxY.\nLa topología del subespacio.\nConjuntos cerrados y punto límite.\nFunciones continuas.\nLa topología producto.\nLa topología métrica.\nLa topología cociente (tema opcional, para realizar en una tarea)\n\nUnidad 2: Nombre: Conexidad y compacidad\nTemas\nEspacios conexos.\nSubespacios conexos de la recta real.\nEspacios compactos.\nSubespacios compactos de la recta real.\nCompacidad por punto límite.\nCompacidad local\n\nUnidad 3: Nombre: Axiomas de Separación y Numerabilidad\nTemas\nAxiomas de numerabilidad.\nAxiomas de separación.\nEspacios Normales.\nLema de Uryshon.\nTeorema de metrización de Uryshon.\nTeorema de extensió .\nFunción Gamma. \nFunción Beta.\nNúcleos de Dirac.\nTransformada de Fourier", "303029": "Unidad 1: Exploración de la actividad investigativa en la Universidad\nCentros de investigación de la Universidad de Antioquia, Grupos de investigación, Clasificación de los grupos de investigación, clasificación de los proyectos de investigación.\n\nUnidad 2: Búsqueda de la Información\nIntroducir al estudiante en la búsqueda de información en bases de datos. Explorar diferentes bases de datos matemáticas y estadísticas.\n\nUnidad 3: Escritura de documentos en LATEX\nIntroducción a la edición de documentos científicos en latex.\n\nUnidad 4: Elaboración del proyecto de trabajo de grado\nDefinición y formulación del trabajo de grado, planteamiento del problema, objetivos, metodología, marco teórico, cronograma. Referencias bibliográficas. Redacción de las distintas partes que componen el texto del proyecto de trabajo de grado. Presentación del proyecto de investigación.\nNota: Las unidades 3 y 4 se realizan simultáneamente, ya que se busca que el estudiante, al finalizar el curso, elabore el texto completo de Proyecto de trabajo de grado. El estudiante debe invertir varias horas en un trabajo de consulta bibliográfica, conversación sobre el tema o problema a trabajar con su eventual asesor y redacción de las distintas partes que compondrán el texto de su proyecto de grado. Por esta razón el curso se clasifica como teórico-práctico: 2 horas teóricas, 2 horas prácticas. De manera transversal a todas las actividades el estudiante debe hacer un curso LaTex que es la escritura básica en matemáticas.", "303352": "Unidad 1: Diferenciabilidad en  \nTemas\nEl espacio  , topología, normas (equivalencia de normas), sucesiones y completitud. \nLímites y continuidad en , continuidad uniforme, funciones definidas en compactos y conexos \nHomeomorfismos en .\nDiferenciabilidad de funciones de  en .\nTeorema sobre diferenciabilidad.\nDerivada direccional, gradiente y teorema de valor medio par function showSaberes(code) {
  const nc = code.replace(/^0+/, '');
  const panel  = document.getElementById('saberes-panel');
  const titleEl = document.getElementById('saberes-title');
  const bodyEl  = document.getElementById('saberes-body');
  const box  = document.querySelector('.course-box[data-code="' + code + '"]');
  const name = box ? box.getAttribute('data-name') : code;
  titleEl.textContent = name + '  (' + code + ')';
  if (SABERES[nc]) {
    bodyEl.textContent = SABERES[nc];
    bodyEl.classList.remove('no-data');
  } else {
    bodyEl.textContent = 'No hay microcurrículo registrado para este curso.';
    bodyEl.classList.add('no-data');
  }
  panel.classList.add('visible');
}

function hideSaberes() {
  document.getElementById('saberes-panel').classList.remove('visible');
}

document.getElementById('saberes-close').addEventListener('click', hideSaberes);

// Parcheo aditivo: showChain también abre el panel
const __origShowChain = showChain;
showChain = function(code) { __origShowChain(code); showSaberes(code); };

// Parcheo aditivo: clearAll también cierra el panel
const __origClearAll = clearAll;
clearAll = function() { __origClearAll(); hideSaberes(); };

// Arrastre del panel por el header
(function() {
  const panel  = document.getElementById('saberes-panel');
  const header = document.getElementById('saberes-header');
  let dragging = false, ox = 0, oy = 0;
  header.addEventListener('mousedown', function(e) {
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    let nx = e.clientX - ox;
    let ny = e.clientY - oy;
    nx = Math.max(0, Math.min(nx, window.innerWidth  - panel.offsetWidth));
    ny = Math.max(0, Math.min(ny, window.innerHeight - panel.offsetHeight));
    panel.style.right  = 'auto';
    panel.style.bottom = 'auto';
    panel.style.left   = nx + 'px';
    panel.style.top    = ny + 'px';
  });
  document.addEventListener('mouseup', function() { dragging = false; });
})();

</script>
</body></html>
