nsión de un espacio vectorial.\n\nUnidad 3:  Transformaciones lineales\nTemas\nTransformaciones lineales. \nÁlgebra de las transformaciones lineales. \nlnyectividad y sobreyectividad.\nIsomorfismos. \nMatriz de cambio de una trasformación lineal. \nPropiedades de los isomorfismos.\n\nUnidad 4: Ortogonalidad\nTemas\nDefinición y propiedades del producto interno. \nComplemento ortogonal de un subespacio. \nProyección ortogonal. \nMínimos cuadrados. \nBases Ortogonales y Ortonormales. \nProcesos Gramm - Schmidt.\n\nUnidad 5: Valores y vectores propios\nTemas\nDefiniciones y propiedades. \nMultiplicidad algebraica y geométrica. \nDiagonalización. \nDiagonalización de matrices simétricas. \nFormas cuadráticas. \nAplicaciones."}, "314412": {"nombre": "Álgebra Lineal y Ecuaciones Diferenciales", "saberes": "Introducción al álgebra lineal y a las ecuaciones diferenciales ordinarias\nPuntos y vectores en el plano y el espacio\nProducto punto y vectorial de vectores\nSoluciones de sistemas de ecuaciones lineales\nMatrices y operaciones básicas\nValores y vectores propios.\nDiagonalización\nAplicación: Crecimiento poblacional a través de la matriz de Leslie\nCrecimiento y desintegración exponencial.\n\n\nEcuaciones diferenciales ordinarias de primer orden.\nSoluciones de ecuaciones diferenciales (Ecuaciones separables)\n\nEcuaciones diferenciales de orden superior\nOperadores diferenciales lineales. EDOs lineales. Espacio solución de una ecuación diferencial lineal homogénea. Base para el espacio solución de una ecuación diferencial lineal homogénea (Conjunto fundamentales de soluciones). \n\nIndependencia lineal y wronskiano.\n\nMétodos de solución para ciertas ecuaciones diferenciales lineales homogéneas: \n       Reducción de orden para EDOs homogéneas de segundo orden. \n       EDOs con coeficientes constantes de orden arbitrario.\n\nSoluciones de EDOs lineales no homogéneas de orden arbitrario: \n       Estructura de la solución: Solución complementaria + Solución particular. \n       Métodos para hallar una solución particular: Coeficientes indeterminados y Variación de parámetros\n\nEl método de series de potencias  \nIntroducción a la teoría de las series de potencias. Utilización de series de potencias para resolver ecuaciones diferenciales en torno a puntos ordinarios\n\nSoluciones de ecuaciones diferenciales lineales a los lados de puntos singulares regulares.\n\nLa ecuación de Bessel."}, "303001": {"nombre": "Álgebra y trigonometría", "saberes": "Unidad 1: Aritmética\nTemas:\nNúmeros reales, potenciación, radicación, expresiones algebraicas y operaciones.\nProductos notables y factorización, números complejos, ecuaciones algebraicas.\nInecuaciones, razones, proporciones y porcentajes.\n\nUnidad 2: Funciones\nTemas:\nRectas, relaciones, funciones: dominio, rango, gráficas, operaciones, composición y transformaciones.\nFunciones por tramos, pares e impares, funciones 1-1, sobre y biyectivas, funciones invertibles.\nFunciones exponenciales, logarítmicas y ecuaciones asociadas.\n\nUnidad 3: Polinomios\nTemas:\nFunciones polinomiales, algoritmo de la división, álgebra de polinomios, Teorema fundamental del álgebra y del valor intermedio, regla de signos de Descartes\nCeros racionales, irracionales y complejos, sistemas de ecuaciones, fracciones parciales\nProgresiones aritméticas y geométricas, sumas y productos.\n\nUnidad 4: Trigonometría\nTemas:\nÁngulos, funciones trigonométricas de ángulos agudos, funciones trigonométricas de números reales, gráficas y propiedades\nFunciones trigonométricas inversas, gráficas y propiedades, identidades y ecuaciones trigonométricas, ley de senos y cosenos\nForma polar de números complejos, productos, cocientes, raíces y potencias, Teorema de Moivre"}};
const CODE_FIXES = {"314070": "304070"};

function normCode(c) {
  let n = c.replace(/^0+/, '') || '0';
  return CODE_FIXES[n] || n;
}

function showSaberes(rawCode) {
  const key  = normCode(rawCode);
  const info = SABERES[key];
  const panel = document.getElementById('saberes-panel');
  const title = document.getElementById('saberes-title');
  const body  = document.getElementById('saberes-body');
  if (!info) {
    title.textContent = rawCode + ' — sin microcurrículo';
    body.textContent  = '(No hay información registrada para este curso.)';
  } else {
    title.textContent = info.nombre + '  [' + rawCode + ']';
    body.textContent  = info.saberes;
  }
  panel.classList.remove('hidden');
}

// ── Drag del panel ─────────────────────────────────────────────
(function() {
  const panel  = document.getElementById('saberes-panel');
  const header = document.getElementById('saberes-header');
  let ox = 0, oy = 0, startX = 0, startY = 0;
  header.addEventListener('mousedown', function(e) {
    startX = e.clientX; startY = e.clientY;
    const r = panel.getBoundingClientRect();
    ox = r.left; oy = r.top;
    panel.style.right = 'unset';
    panel.style.bottom = 'unset';
    document.addEventListener('mousemove', drag);
    document.addEventListener('mouseup', stopDrag, {once: true});
  });
  function drag(e) {
    const nx = ox + e.clientX - startX;
    const ny = oy + e.clientY - startY;
    panel.style.left = Math.max(0, Math.min(nx, window.innerWidth  - panel.offsetWidth))  + 'px';
    panel.style.top  = Math.max(0, Math.min(ny, window.innerHeight - panel.offsetHeight)) + 'px';
  }
  function stopDrag() { document.removeEventListener('mousemove', drag); }
})();

// ── Cerrar panel ───────────────────────────────────────────────
document.getElementById('saberes-close').addEventListener('click', function() {
  document.getElementById('saberes-panel').classList.add('hidden');
});

// ── Parche sobre los click-handlers de la malla ────────────────
(function() {
  function patchClickHandlers() {
    document.querySelectorAll('g.course-box').forEach(function(g) {
      g.addEventListener('click', function(e) {
        const code = g.getAttribute('data-code');
        if (code) showSaberes(code);
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', patchClickHandlers);
  } else {
    patchClickHandlers();
  }
})();

</script>
